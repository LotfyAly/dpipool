<script>

var NAMES=["Anouk","Arjen","David","Dennis","Dorte","Elise","Femke","Ferry","Floortje","Fyodor","Gert Jan","Giovanni","Hans","Jacob","Jacques","Jasper d.","Jasper S.","Jelle","Jesse B.","Jesse v.","Jesse W.","Joram","Judith","Kirsten","Kitty","Koen","Laith","Laurens","Lizzy","Lotfy","Mara","Mark O.","Mark S.","Marvin","Max","Michel","Myrthe","Natasja","Nicholas","Niels d.","Niels H.","Ott","Pieter","Redginald","Roan","Robbert L.","Robbert v.","Roland","Rolf","Ruben","Ruurd","Sasha","Stan","Thijs","Ties","Tim","Tjalling","Tom","Veronique","Wesley","Wouter","Alexander","Allard","Dick","Douwe","Esm\u00e9e","Ileen","John","Kees","Kelly","Nick","Nicole","Philine","Saar","Sander","Yashica","Rob"];
var db=null,S={players:[],matches:[],view:'k',selP:null,step:'form',pend:null,p1:null,p2:null,wid:null,srch:null,sq:'',h1:'',h2:''};

function uid(){return Math.random().toString(36).slice(2,9)}
function ini(n){return(n||'').split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0]||''}).join('').toUpperCase()}
function ipl(){return NAMES.map(function(n){return{id:uid(),name:n,elo:ELO0,wins:0,losses:0}})}
function sorted(){return S.players.slice().sort(function(a,b){return b.elo-a.elo})}
function active(){return sorted().filter(function(p){return p.wins+p.losses>0})}
function find(id){for(var i=0;i<S.players.length;i++){if(S.players[i].id===id)return S.players[i]}return null}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;setTimeout(function(){t.style.opacity=0},2500)}
function hideLoad(){document.getElementById('loading').style.display='none';document.getElementById('app').style.display='-webkit-box';document.getElementById('app').style.display='-webkit-flex';document.getElementById('app').style.display='-ms-flexbox';document.getElementById('app').style.display='flex'}

async function dbLoad(){
  var res=await Promise.all([db.from('players').select('*').order('elo',{ascending:false}),db.from('matches').select('*').order('created_at',{ascending:false}).limit(200)]);
  S.players=(res[0].data||[]).map(function(p){return{id:p.id,name:p.name,elo:p.elo,wins:p.wins,losses:p.losses}});
  S.matches=(res[1].data||[]).map(function(m){return{id:m.id,wid:m.winner_id,lid:m.loser_id,d:m.delta,date:m.created_at}});
}
async function dbSeed(){
  var r=await db.from('players').select('id').limit(1);
  if(r.data&&r.data.length>0)return;
  await db.from('players').insert(NAMES.map(function(n){return{name:n,elo:ELO0,wins:0,losses:0}}));
}

function go(v){
  S.srch=null;S.sq='';S.view=v;S.selP=null;S.step='form';S.pend=null;
  ['k','s','p'].forEach(function(x){var e=document.getElementById('n'+x);if(e){var c=e.className.replace(/\ba\b/,'').trim();e.className=c+(x===v?' a':'')}});
  var f=document.getElementById('fab');if(f)f.style.background=v==='w'?'var(--gd)':'var(--g)';render();
}

function openS(slot){S.srch=slot;S.sq='';document.getElementById('mc').innerHTML=bSrch();setTimeout(function(){fillList();var i=document.getElementById('si');if(i)i.focus()},50)}
function closeS(){S.srch=null;S.sq='';render()}
function pick(id){if(S.srch==='p1')S.p1=id;else S.p2=id;if(S.p1===S.p2){if(S.srch==='p1')S.p2=null;else S.p1=null}S.wid=null;S.srch=null;S.sq='';render()}
function sFilter(q){S.sq=q;fillList()}
function fillList(){
  var oth=S.srch==='p1'?S.p2:S.p1,cur=S.srch==='p1'?S.p1:S.p2,q=S.sq.toLowerCase();
  var lst=S.players.filter(function(p){return p.id!==oth&&(!q||p.name.toLowerCase().indexOf(q)>-1)}).sort(function(a,b){return a.name.localeCompare(b.name)});
  var el=document.getElementById('slist');if(!el)return;
  el.innerHTML=lst.map(function(p){return'<div class="pi" onclick="pick(\''+p.id+'\')"'+(p.id===cur?' style="border-color:var(--o);background:var(--ol)"':'')+'>'+
    '<div class="av">'+ini(p.name)+'</div><div class="rii"><div class="rname">'+p.name+'</div></div>'+
    (p.id===cur?'<span style="color:var(--o);font-size:20px;line-height:1">&#10003;</span>':'')+
    '</div>'}).join('')||'<div class="empty">Geen resultaten</div>'
}
function clearP(s){if(s==='p1')S.p1=null;else S.p2=null;S.wid=null;render()}
function setW(id){S.wid=id;render()}

function prep(){
  var p1=find(S.p1),p2=find(S.p2);if(!p1||!p2){toast('Selecteer twee spelers');return}
  if(!S.wid){toast('Selecteer de winnaar');return}
  var w=p1.id===S.wid?p1:p2,l=w===p1?p2:p1;
  var d=Math.round(K*(1-1/(1+Math.pow(10,(l.elo-w.elo)/400))));
  S.pend={wid:w.id,lid:l.id,wn:w.name,ln:l.name,we:w.elo,le:l.elo,ww:w.wins,ll:l.losses,d:d};S.step='confirm';render();
}

async function ok(){
  var m=S.pend;
  try{
    await Promise.all([
      db.from('players').update({elo:m.we+m.d,wins:m.ww+1}).eq('id',m.wid),
      db.from('players').update({elo:Math.max(200,m.le-m.d),losses:m.ll+1}).eq('id',m.lid),
      db.from('matches').insert({winner_id:m.wid,loser_id:m.lid,delta:m.d})
    ]);
    await dbLoad();
    var wn=m.wn,d=m.d;S.step='form';S.pend=null;S.p1=null;S.p2=null;S.wid=null;
    toast('+'+d+' ELO voor '+wn+'!');render();
  }catch(e){toast('Fout: '+e.message)}
}
function cancel(){S.step='form';S.pend=null;render()}

async function undo(){
  var last=S.matches[0];if(!last){toast('Geen wedstrijd');return}
  if(!confirm('Laatste wedstrijd ongedaan maken?'))return;
  var w=find(last.wid),l=find(last.lid);if(!w||!l)return;
  try{
    await Promise.all([
      db.from('matches').delete().eq('id',last.id),
      db.from('players').update({elo:w.elo-last.d,wins:Math.max(0,w.wins-1)}).eq('id',w.id),
      db.from('players').update({elo:l.elo+last.d,losses:Math.max(0,l.losses-1)}).eq('id',l.id)
    ]);
    await dbLoad();toast('Wedstrijd ongedaan gemaakt');render();
  }catch(e){toast('Fout: '+e.message)}
}

function streak(pid){var ms=S.matches.filter(function(m){return m.wid===pid||m.lid===pid}).sort(function(a,b){return new Date(a.date)-new Date(b.date)});var mx=0,c=0;ms.forEach(function(m){if(m.wid===pid){c++;if(c>mx)mx=c}else c=0});return mx}
function weekElo(pid){var w=Date.now()-7*24*60*60*1000;return S.matches.filter(function(m){return new Date(m.date)>=w&&(m.wid===pid||m.lid===pid)}).reduce(function(s,m){return m.wid===pid?s+m.d:s-m.d},0)}
function h2h(a,b){var ms=S.matches.filter(function(m){return(m.wid===a&&m.lid===b)||(m.wid===b&&m.lid===a)});return{t:ms.length,aw:ms.filter(function(m){return m.wid===a}).length,bw:ms.filter(function(m){return m.wid===b}).length,ms:ms.slice(0,5)}}

function goP(id){if(S.view==='k')S.view='p';S.selP=id;render()}
async function addP(){
  var i=document.getElementById('nn'),n=i&&i.value?i.value.trim():'';
  if(!n){toast('Vul een naam in');return}
  if(S.players.filter(function(p){return p.name.toLowerCase()===n.toLowerCase()}).length){toast('Bestaat al');return}
  try{var r=await db.from('players').insert({name:n,elo:ELO0,wins:0,losses:0}).select().single();
    S.players=S.players.concat([{id:r.data.id,name:r.data.name,elo:r.data.elo,wins:r.data.wins,losses:r.data.losses}]);
    if(i)i.value='';toast(n+' toegevoegd!');render();}catch(e){toast('Fout: '+e.message)}
}
async function delP(id){
  var p=find(id);if(!p)return;
  if(p.wins+p.losses>0&&!confirm(p.name+' verwijderen?'))return;
  try{await Promise.all([db.from('matches').delete().or('winner_id.eq.'+id+',loser_id.eq.'+id),db.from('players').delete().eq('id',id)]);
    await dbLoad();S.selP=null;toast(p.name+' verwijderd');render();}catch(e){toast('Fout: '+e.message)}
}
function filterP(q){
  var el=document.getElementById('plist');if(!el)return;
  var s=sorted(),a=S.players.slice().sort(function(x,y){return x.name.localeCompare(y.name)});
  var f=q?a.filter(function(p){return p.name.toLowerCase().indexOf(q.toLowerCase())>-1}):a;
  el.innerHTML=f.map(function(p){var r=0;for(var i=0;i<s.length;i++){if(s[i].id===p.id){r=i+1;break}}var t=p.wins+p.losses;
    return'<div class="pi" onclick="goP(\''+p.id+'\')"><div class="av">'+ini(p.name)+'</div>'+
    '<div class="rii"><div class="rname">'+p.name+'</div><div class="rsub">#'+r+' &middot; '+p.wins+'W '+p.losses+'V'+(t?'':' &middot; inactief')+'</div></div>'+
    '<div class="elo">'+p.elo+'</div></div>'}).join('')||'<div class="empty">Niet gevonden</div>'
}

function bSrch(){return'<div class="sh-hdr"><button class="back" onclick="closeS()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Terug</button><div class="lbl">'+(S.srch==='p1'?'Kies speler 1':'Kies speler 2')+'</div><input id="si" type="search" placeholder="Zoek op naam..." oninput="sFilter(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div><div id="slist" style="margin-top:10px"></div>'}


function weekDelta(pid){var w=Date.now()-7*24*60*60*1000;return S.matches.filter(function(m){return new Date(m.date)>=w&&(m.wid===pid||m.lid===pid)}).reduce(function(s,m){return m.wid===pid?s+m.d:s-m.d},0)}
function arrow(pid){var d=weekDelta(pid);if(d>0)return'<span style="color:#27ae60;font-size:11px;font-weight:800;margin-left:2px">&#9650;</span>';if(d<0)return'<span style="color:#e74c3c;font-size:11px;font-weight:800;margin-left:2px">&#9660;</span>';return''}
function kiCard(p,pos){var nc=pos===1?'t1':pos===2?'t2':pos===3?'t3':'';var medal=pos===1?'&#127947;':pos===2?'&#129352;':pos===3?'&#129353;':'';
  return'<div class="ki" onclick="goP(\''+p.id+'\')">'+'<div class="ki-num '+nc+'">'+(medal||pos)+'</div>'+'<div class="ki-av">'+ini(p.name)+'</div>'+'<div class="ki-info"><div class="ki-name">'+p.name+'</div><div class="ki-elo">'+p.elo+'</div></div></div>'}
function bK(){var act=active();
  if(!act.length)return'<div class="lbl">0 actieve spelers</div><div class="empty">Nog geen wedstrijden.<br>Tik op de groene knop!</div>';
  var half=Math.ceil(act.length/2);
  var left=act.slice(0,half).map(function(p,i){return kiCard(p,i+1)}).join('');
  var right=act.slice(half).map(function(p,i){return kiCard(p,half+i+1)}).join('');
  return'<div class="lbl">'+act.length+' actieve spelers</div>'+'<div class="kcols"><div class="kcol">'+left+'</div><div class="kcol">'+right+'</div></div>'}

function bW(){var p1=find(S.p1),p2=find(S.p2),lw=S.matches[0]?find(S.matches[0].wid):null,ll=S.matches[0]?find(S.matches[0].lid):null,html='';
  if(lw&&ll)html+='<div class="ub"><div style="flex:1;-webkit-box-flex:1;font-size:12px;color:var(--mid)">Laatste: <strong style="color:var(--n)">'+lw.name+'</strong> won van '+ll.name+'</div><button class="ubtn" onclick="undo()">&#8617; Ongedaan</button></div>';
  html+='<div class="lbl">Nieuwe wedstrijd</div><div class="card">';
  html+='<div style="margin-bottom:13px"><div class="plbl">Speler 1</div><div class="pp'+(p1?' f':'')+'" onclick="openS(\'p1\')">';
  if(p1)html+='<span style="flex:1;-webkit-box-flex:1;font-size:14px;color:var(--n);font-weight:600">'+p1.name+'</span><button onclick="event.stopPropagation();clearP(\'p1\')" style="border:none;background:none;color:var(--od);cursor:pointer;font-size:22px;padding:0 0 0 8px;line-height:1;-webkit-appearance:none;appearance:none">&times;</button>';
  else html+='<span style="flex:1;-webkit-box-flex:1;font-size:14px;color:var(--mid)">&#8212; kies speler &#8212;</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--mid)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
  html+='</div></div><div style="margin-bottom:13px"><div class="plbl">Speler 2</div><div class="pp'+(p2?' f':'')+'" onclick="openS(\'p2\')">';
  if(p2)html+='<span style="flex:1;-webkit-box-flex:1;font-size:14px;color:var(--n);font-weight:600">'+p2.name+'</span><button onclick="event.stopPropagation();clearP(\'p2\')" style="border:none;background:none;color:var(--od);cursor:pointer;font-size:22px;padding:0 0 0 8px;line-height:1;-webkit-appearance:none;appearance:none">&times;</button>';
  else html+='<span style="flex:1;-webkit-box-flex:1;font-size:14px;color:var(--mid)">&#8212; kies speler &#8212;</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--mid)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
  html+='</div></div>';
  if(p1&&p2)html+='<div class="lbl">Wie heeft gewonnen?</div><div class="wr"><button class="wb'+(S.wid===p1.id?' s':'')+'" onclick="setW(\''+p1.id+'\')">'+p1.name+'</button><button class="wb'+(S.wid===p2.id?' s':'')+'" onclick="setW(\''+p2.id+'\')">'+p2.name+'</button></div>';
  else html+='<div style="font-size:13px;color:var(--mid);margin-bottom:13px">Selecteer eerst twee spelers</div>';
  html+='<button class="btn" onclick="prep()"'+((!p1||!p2||!S.wid)?' disabled':'')+'>Doorgaan &#8594;</button></div>';
  var rc=S.matches.slice(0,6);if(rc.length){html+='<div class="lbl" style="margin-top:4px">Recente wedstrijden</div>';rc.forEach(function(m){var w=find(m.wid),l=find(m.lid),ds=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});html+='<div class="mi"><div><div style="font-size:13px;color:var(--n);font-weight:600"><strong>'+(w?w.name:'?')+'</strong> vs '+(l?l.name:'?')+'</div><div style="font-size:11px;color:var(--mid);margin-top:2px">'+ds+' &nbsp;&middot;&nbsp; <span style="color:var(--o);font-weight:700">+'+m.d+' ELO</span></div></div><span class="badge bw">Gewon.</span></div>'})}return html}

function bConf(){var m=S.pend,nwe=m.we+m.d,nle=Math.max(200,m.le-m.d);
  return'<div class="cw"><svg width="72" height="72" viewBox="0 0 64 64" style="margin-bottom:18px"><circle cx="32" cy="32" r="30" fill="#111"/><circle cx="32" cy="26" r="16" fill="white"/><circle cx="32" cy="26" r="8" fill="#111"/><text x="32" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="sans-serif">8</text></svg>'+
  '<div style="font-size:24px;font-weight:800;color:var(--n);margin-bottom:4px">'+m.wn+' wint!</div><div style="font-size:14px;color:var(--mid);margin-bottom:20px">van '+m.ln+'</div>'+
  '<div class="cc"><div class="cx"><div class="av" style="background:var(--gl);color:var(--gd);margin:0 auto 8px;width:40px;height:40px">'+ini(m.wn)+'</div><div style="font-size:13px;font-weight:700;color:var(--n);margin-bottom:5px">'+m.wn+'</div><div style="font-size:12px;color:var(--mid)">'+m.we+' &#8594; <strong style="color:var(--gd)">'+nwe+'</strong></div><div style="font-size:13px;color:var(--gd);font-weight:800;margin-top:4px">+'+m.d+' ELO</div></div>'+
  '<div class="cx"><div class="av" style="background:#f0ece6;color:var(--mid);margin:0 auto 8px;width:40px;height:40px">'+ini(m.ln)+'</div><div style="font-size:13px;font-weight:700;color:var(--n);margin-bottom:5px">'+m.ln+'</div><div style="font-size:12px;color:var(--mid)">'+m.le+' &#8594; <strong style="color:#c0392b">'+nle+'</strong></div><div style="font-size:13px;color:#c0392b;font-weight:800;margin-top:4px">-'+m.d+' ELO</div></div></div>'+
  '<div style="display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;gap:10px;width:100%"><button class="obtn" onclick="cancel()" style="-webkit-box-flex:1;-webkit-flex:1;-ms-flex:1;flex:1">Annuleer</button><button class="btn" onclick="ok()" style="-webkit-box-flex:2;-webkit-flex:2;-ms-flex:2;flex:2">Bevestig &#10003;</button></div></div>'}

function bS(){var act=active();if(!act.length)return'<div class="empty">Nog geen wedstrijden gespeeld.</div>';
  var top=act[0];act.forEach(function(p){if(p.wins+p.losses>top.wins+top.losses)top=p});
  var topStr=act.map(function(p){return{p:p,s:streak(p.id)}}).sort(function(a,b){return b.s-a.s})[0];
  var mv=act.map(function(p){return{p:p,c:weekElo(p.id)}}).filter(function(x){return x.c!==0}).sort(function(a,b){return b.c-a.c});
  var topUp=mv[0],topDn=mv[mv.length-1];
  var sp=S.players.slice().sort(function(a,b){return a.name.localeCompare(b.name)});
  var p1=S.h1?find(S.h1):null,p2=S.h2?find(S.h2):null,hh=p1&&p2?h2h(p1.id,p2.id):null;
  var html='<div class="lbl">Hoogtepunten</div>';
  if(topStr&&topStr.s>0)html+='<div class="sh"><div class="si" style="background:#fff3cd">&#128293;</div><div><div style="font-size:10px;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.07em">Langste winserie ooit</div><div style="font-size:15px;font-weight:700;color:var(--n);margin-top:2px">'+topStr.p.name+'</div><div style="font-size:12px;color:var(--mid)">'+topStr.s+' op rij gewonnen</div></div></div>';
  html+='<div class="sh"><div class="si" style="background:var(--ol)">&#127922;</div><div><div style="font-size:10px;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.07em">Meest actief</div><div style="font-size:15px;font-weight:700;color:var(--n);margin-top:2px">'+top.name+'</div><div style="font-size:12px;color:var(--mid)">'+(top.wins+top.losses)+' wedstrijden</div></div></div>';
  if(topUp&&topUp.c>0)html+='<div class="sh"><div class="si" style="background:var(--gl)">&#128200;</div><div><div style="font-size:10px;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.07em">Stijger van de week</div><div style="font-size:15px;font-weight:700;color:var(--n);margin-top:2px">'+topUp.p.name+'</div><div style="font-size:12px;color:var(--mid)">+'+topUp.c+' ELO in 7 dagen</div></div></div>';
  if(topDn&&topDn.c<0)html+='<div class="sh"><div class="si" style="background:#fad7d7">&#128201;</div><div><div style="font-size:10px;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.07em">Daler van de week</div><div style="font-size:15px;font-weight:700;color:var(--n);margin-top:2px">'+topDn.p.name+'</div><div style="font-size:12px;color:var(--mid)">'+topDn.c+' ELO in 7 dagen</div></div></div>';
  
  // Last 10 matches
  html+='<div class="div"></div><div class="lbl">Laatste 10 wedstrijden</div>';
  var last10=S.matches.slice(0,10);
  if(last10.length){last10.forEach(function(m){var w=find(m.wid),l=find(m.lid),ds=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});html+='<div class="mi"><div><div style="font-size:13px;color:var(--n);font-weight:600"><strong>'+(w?w.name:'?')+'</strong> vs '+(l?l.name:'?')+'</div><div style="font-size:11px;color:var(--mid);margin-top:2px">'+ds+' &middot; <span style="color:var(--o);font-weight:700">+'+m.d+' ELO</span></div></div><span class="badge bw">Gewon.</span></div>'})}
  else{html+='<div class="empty" style="padding:12px 0">Nog geen wedstrijden gespeeld</div>'}
  html+='<div class="div"></div><div class="lbl">Head-to-head</div><div class="card">';
  html+='<div style="display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;gap:10px;margin-bottom:12px">';
  html+='<div style="-webkit-box-flex:1;-webkit-flex:1;-ms-flex:1;flex:1"><div class="plbl">Speler 1</div><select onchange="S.h1=this.value;render()"><option value="">&#8212; kies &#8212;</option>'+sp.map(function(p){return'<option value="'+p.id+'"'+(S.h1===p.id?' selected':'')+'>'+p.name+'</option>'}).join('')+'</select></div>';
  html+='<div style="-webkit-box-flex:1;-webkit-flex:1;-ms-flex:1;flex:1"><div class="plbl">Speler 2</div><select onchange="S.h2=this.value;render()"><option value="">&#8212; kies &#8212;</option>'+sp.filter(function(p){return p.id!==S.h1}).map(function(p){return'<option value="'+p.id+'"'+(S.h2===p.id?' selected':'')+'>'+p.name+'</option>'}).join('')+'</select></div>';
  html+='</div>';
  if(hh&&hh.t>0){var pct=Math.round(hh.aw/hh.t*100);
    html+='<div style="display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;font-weight:700;color:var(--o);-webkit-flex-shrink:0;flex-shrink:0">'+p1.name+'</span><div style="-webkit-box-flex:1;-webkit-flex:1;flex:1;height:8px;border-radius:4px;overflow:hidden;background:var(--bor);display:-webkit-box;display:-webkit-flex;display:flex"><div style="width:'+pct+'%;background:var(--o)"></div><div style="width:'+(100-pct)+'%;background:var(--n)"></div></div><span style="font-size:12px;font-weight:700;color:var(--n);-webkit-flex-shrink:0;flex-shrink:0">'+p2.name+'</span></div>';
    html+='<div style="text-align:center;font-size:30px;font-weight:800;color:var(--n)">'+hh.aw+' &ndash; '+hh.bw+'</div><div style="text-align:center;font-size:12px;color:var(--mid);margin-bottom:10px">'+hh.t+' wedstrijd'+(hh.t!==1?'en':'')+'</div>';
    hh.ms.forEach(function(m){var won=m.wid===p1.id,d=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});html+='<div class="mi"><div><div style="font-size:13px;color:var(--n);font-weight:600">'+(won?p1.name:p2.name)+' won</div><div style="font-size:11px;color:var(--mid)">'+d+'</div></div><span class="badge '+(won?'bw':'bl')+'">'+(won?p1.name:p2.name)+'</span></div>'})
  }else if(hh)html+='<div style="font-size:13px;color:var(--mid);text-align:center;padding:10px">Nog nooit tegen elkaar gespeeld</div>';
  else html+='<div style="font-size:13px;color:var(--mid);text-align:center;padding:10px">Selecteer twee spelers</div>';
  html+='</div>';return html}

function bP(){if(S.selP){var p=find(S.selP);if(!p){S.selP=null;return bP()}
  var s=sorted(),r=0;for(var i=0;i<s.length;i++){if(s[i].id===p.id){r=i+1;break}}
  var tot=p.wins+p.losses,pct=tot?Math.round(p.wins/tot*100):0,pm=S.matches.filter(function(m){return m.wid===p.id||m.lid===p.id}).slice(0,10),str=streak(p.id);
  var html='<button class="back" onclick="S.selP=null;render()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Terug</button>';
  html+='<div class="card" style="display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;gap:12px;margin-bottom:10px"><div style="width:50px;height:50px;border-radius:50%;background:var(--ol);display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;font-size:16px;font-weight:800;color:var(--od);-webkit-flex-shrink:0;flex-shrink:0">'+ini(p.name)+'</div><div style="-webkit-box-flex:1;-webkit-flex:1;flex:1"><div style="font-size:17px;font-weight:700;color:var(--n)">'+p.name+'</div><div style="font-size:12px;color:var(--mid);margin-top:2px">Rang #'+r+' van '+S.players.length+'</div></div><button class="dbtn" onclick="delP(\''+p.id+'\')">Verwijder</button></div>';
  html+='<div class="sg"><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--o)">'+p.elo+'</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">ELO</div></div><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--n)">'+p.wins+'</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">Gewon.</div></div><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--n)">'+p.losses+'</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">Verloren</div></div></div>';
  html+='<div class="sg"><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--n)">'+tot+'</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">Gespeeld</div></div><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--n)">'+pct+'%</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">Winratio</div></div><div class="sb"><div style="font-size:22px;font-weight:800;color:var(--n)">'+str+'</div><div style="font-size:10px;color:var(--mid);margin-top:3px;font-weight:700;text-transform:uppercase">Serie</div></div></div>';
  
  // ELO graph
  var eloHistory=[];var runElo=1200;var pmForGraph=S.matches.filter(function(m){return m.wid===p.id||m.lid===p.id}).slice(0,20).reverse();
  pmForGraph.forEach(function(m){runElo=m.wid===p.id?runElo+m.d:runElo-m.d;eloHistory.push(runElo)});
  if(eloHistory.length>1){
    var minE=Math.min.apply(null,eloHistory)-10,maxE=Math.max.apply(null,eloHistory)+10,rangeE=maxE-minE||1;
    var W=300,H=60,pad=4;
    var pts=eloHistory.map(function(e,i){var x=pad+i*(W-pad*2)/(eloHistory.length-1);var y=H-pad-(e-minE)/rangeE*(H-pad*2);return x+','+y}).join(' ');
    var lastY=H-pad-(eloHistory[eloHistory.length-1]-minE)/rangeE*(H-pad*2);
    var color=eloHistory[eloHistory.length-1]>=eloHistory[0]?'#27ae60':'#e74c3c';
    html+='<div class="card" style="padding:12px 14px 8px;margin-bottom:10px">';
    html+='<div class="lbl" style="margin-bottom:6px">ELO verloop</div>';
    html+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:60px;overflow:visible">';
    html+='<defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.15"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>';
    html+='<polygon points="'+pad+','+H+' '+pts+' '+(pad+((eloHistory.length-1)*(W-pad*2)/(eloHistory.length-1)))+','+H+'" fill="url(#eg)"/>';
    html+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    html+='<circle cx="'+(pad+(eloHistory.length-1)*(W-pad*2)/(eloHistory.length-1))+'" cy="'+lastY+'" r="3.5" fill="'+color+'"/>';
    html+='</svg>';
    html+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mid);margin-top:2px"><span>'+eloHistory.length+' wedstrijden</span><span style="font-weight:700;color:'+color+'">'+(eloHistory[eloHistory.length-1]>=eloHistory[0]?'+':'')+(eloHistory[eloHistory.length-1]-eloHistory[0])+' ELO</span></div>';
    html+='</div>';
  }
  html+='<div class="lbl" style="margin-top:4px">Wedstrijdhistorie</div>';
  if(pm.length)pm.forEach(function(m){var won=m.wid===p.id,opp=find(won?m.lid:m.wid),d=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});html+='<div class="mi"><div><div style="font-size:13px;color:var(--n);font-weight:600">vs '+(opp?opp.name:'?')+'</div><div style="font-size:11px;color:var(--mid);margin-top:2px">'+d+' &middot; '+(won?'+':'-')+m.d+' ELO</div></div><span class="badge '+(won?'bw':'bl')+'">'+(won?'Gewon.':'Verlor.')+'</span></div>'});
  else html+='<div class="empty">Nog geen wedstrijden</div>';return html}
  var s=sorted(),a=S.players.slice().sort(function(x,y){return x.name.localeCompare(y.name)});
  var html='<div class="lbl">Spelersbeheer &middot; '+S.players.length+' spelers</div>';
  html+='<div class="card" style="margin-bottom:10px"><div class="lbl">Nieuwe speler</div><div class="ar"><input type="text" id="nn" placeholder="Voornaam (+ initiaal)" onkeydown="if(event.keyCode===13)addP()" autocorrect="off" autocapitalize="words"><button class="btn" style="width:auto;padding:11px 16px;-webkit-flex-shrink:0;flex-shrink:0" onclick="addP()">+</button></div></div>';
  html+='<input type="search" placeholder="Zoek speler..." style="margin-bottom:10px" oninput="filterP(this.value)" autocorrect="off" autocapitalize="off">';
  html+='<div id="plist">'+a.map(function(p){var r=0;for(var i=0;i<s.length;i++){if(s[i].id===p.id){r=i+1;break}}var t=p.wins+p.losses;return'<div class="pi" onclick="goP(\''+p.id+'\')"><div class="av">'+ini(p.name)+'</div><div class="rii"><div class="rname">'+p.name+'</div><div class="rsub">#'+r+' &middot; '+p.wins+'W '+p.losses+'V'+(t?'':' &middot; inactief')+'</div></div><div class="elo">'+p.elo+'</div></div>'}).join('')+'</div>';return html}

function render(){
  var ct=document.getElementById('ct');if(ct)ct.textContent=S.matches.length?S.matches.length+'x':'';
  var f=document.getElementById('fab');if(f)f.style.background=S.view==='w'?'var(--gd)':'var(--g)';
  ['k','s','p'].forEach(function(x){var e=document.getElementById('n'+x);if(e){var c=e.className.replace(/\ba\b/,'').trim();e.className=c+(S.view===x?' a':'')}});
  if(S.srch){document.getElementById('mc').innerHTML=bSrch();setTimeout(function(){fillList();var i=document.getElementById('si');if(i)i.focus()},50);return}
  var c=document.getElementById('mc');
  if(S.view==='k')c.innerHTML=bK();else if(S.view==='w')c.innerHTML=S.step==='confirm'?bConf():bW();else if(S.view==='s')c.innerHTML=bS();else c.innerHTML=bP();
}

async function init(){
  if(SUPABASE_URL==='JOUW_SUPABASE_URL_HIER'){document.getElementById('loading').style.display='none';document.getElementById('cfg').style.display='-webkit-box';document.getElementById('cfg').style.display='-webkit-flex';document.getElementById('cfg').style.display='-ms-flexbox';document.getElementById('cfg').style.display='flex';return}
  try{db=_sb.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);await dbSeed();await dbLoad();hideLoad();render()}
  catch(e){document.getElementById('loading').querySelector('p').textContent='Verbindingsfout: '+e.message}
}
init();
</script>
