html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f3ef}

/* CONTENT */

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.bw{background:#d8f3dc;color:#155724}.bl{background:#fce4e4;color:#7b1d1d}

/* MATCH ITEMS */
.mi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b)}
.mi:last-child{border-bottom:none}

/* PLAYER ITEMS */
.pi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;background:white;margin-bottom:3px;border:1px solid transparent;transition:border-color .12s}
.pi:hover{border-color:var(--ol)}

/* UNDO BAR */
.ub{display:flex;align-items:center;gap:8px;background:white;border:1px solid var(--b);border-radius:var(--r);padding:8px 10px;margin-bottom:10px}
.ubtn{font-size:11px;color:var(--od);background:var(--ol);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit;font-weight:600}

/* CONFIRM VIEW */
.cw{display:flex;flex-direction:column;align-items:center;padding:20px 16px;text-align:center}
.cc{display:flex;gap:8px;margin-bottom:20px;width:100%}
.cx{flex:1;background:white;border-radius:var(--r);padding:10px;border:1px solid var(--b);text-align:center}

/* STATS */
.sh{background:white;border-radius:var(--r);padding:12px;border:1px solid var(--b);margin-bottom:6px;display:flex;align-items:center;gap:12px}
.si{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.sb{background:white;border-radius:var(--r);padding:10px 8px;text-align:center;border:1px solid var(--b)}

/* MISC */
.back{display:flex;align-items:center;gap:5px;color:var(--o);font-size:13px;cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:inherit;padding:0;font-weight:600}
.empty{text-align:center;color:var(--m);padding:24px 16px;font-size:13px;line-height:1.6}
.div{height:1px;background:var(--b);margin:10px 0}
.ar{display:flex;gap:8px}.ar input{flex:1}
.srch-hdr{background:var(--c);padding:12px 14px 8px;margin:-12px -14px 0;position:sticky;top:-12px;z-index:2}
input[type=text],input[type=search]{width:100%;padding:9px 10px;border-radius:var(--r);border:1.5px solid var(--b);background:white;color:var(--n);font-size:14px;font-family:inherit;transition:border-color .15s}
input:focus{outline:none;border-color:var(--o)}
select{width:100%;padding:9px 10px;border-radius:var(--r);border:1.5px solid var(--b);background:white;color:var(--n);font-size:13px;font-family:inherit}
select:focus{outline:none;border-color:var(--o)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--n);color:white;padding:8px 18px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;z-index:100;font-weight:500}
</style>

<script>
// ─── Config & init ────────────────────────────────────────────
const { createClient } = supabase;
const ELO0 = 1200, K = 32, PWD = 'Hetistijdvooreennieuwestart';
const DEFAULT_NAMES = ["Anouk","Arjen","David","Dennis","Dorte","Elise","Femke","Ferry","Floortje","Fyodor","Gert Jan","Giovanni","Hans","Jacob","Jacques","Jasper d.","Jasper S.","Jelle","Jesse B.","Jesse v.","Jesse W.","Joram","Judith","Kirsten","Kitty","Koen","Laith","Laurens","Lizzy","Lotfy","Mara","Mark O.","Mark S.","Marvin","Max","Michel","Myrthe","Natasja","Nicholas","Niels d.","Niels H.","Ott","Pieter","Redginald","Roan","Robbert L.","Robbert v.","Roland","Rolf","Ruben","Ruurd","Sasha","Stan","Thijs","Ties","Tim","Tjalling","Tom","Veronique","Wesley","Wouter","Alexander","Allard","Dick","Douwe","Esmée","Ileen","John","Kees","Kelly","Nick","Nicole","Philine","Saar","Sander","Yashica","Rob"];

let db = null;
let S = { players:[], matches:[], view:'k', selP:null, step:'form', pend:null, p1:null, p2:null, wid:null, srch:null, sq:'', h1:'', h2:'' };

// ─── Helpers ──────────────────────────────────────────────────
const ini = n => (n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const sorted = () => [...S.players].sort((a,b)=>b.elo-a.elo);
const active = () => sorted().filter(p=>p.wins+p.losses>0);

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2500);
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ─── Supabase DB ──────────────────────────────────────────────
async function dbLoad() {
  const [{ data: players }, { data: matches }] = await Promise.all([
    db.from('players').select('*').order('elo', { ascending: false }),
    db.from('matches').select('*').order('created_at', { ascending: false }).limit(200)
  ]);
  S.players = (players || []).map(p => ({ id: p.id, name: p.name, elo: p.elo, wins: p.wins, losses: p.losses }));
  S.matches = (matches || []).map(m => ({ id: m.id, wid: m.winner_id, lid: m.loser_id, d: m.delta, date: m.created_at }));
}

async function dbSeed() {
  const { data } = await db.from('players').select('id').limit(1);
  if (data && data.length > 0) return;
  await db.from('players').insert(DEFAULT_NAMES.map(name => ({ name, elo: ELO0, wins: 0, losses: 0 })));
}

async function dbSaveMatch(winnerId, loserId, winnerElo, loserElo, winnerWins, loserLosses, delta) {
  await Promise.all([
    db.from('players').update({ elo: winnerElo, wins: winnerWins }).eq('id', winnerId),
    db.from('players').update({ elo: loserElo, losses: loserLosses }).eq('id', loserId),
    db.from('matches').insert({ winner_id: winnerId, loser_id: loserId, delta })
  ]);
}

async function dbUndoMatch(matchId, winnerId, loserId, winnerElo, loserElo, winnerWins, loserLosses) {
  await Promise.all([
    db.from('matches').delete().eq('id', matchId),
    db.from('players').update({ elo: winnerElo, wins: winnerWins }).eq('id', winnerId),
    db.from('players').update({ elo: loserElo, losses: loserLosses }).eq('id', loserId)
  ]);
}

async function dbAddPlayer(name) {
  const { data, error } = await db.from('players').insert({ name, elo: ELO0, wins: 0, losses: 0 }).select().single();
  if (error) throw error;
  return data;
}

async function dbDeletePlayer(id) {
  await Promise.all([
    db.from('matches').delete().or(`winner_id.eq.${id},loser_id.eq.${id}`),
    db.from('players').delete().eq('id', id)
  ]);
}

// ─── Navigation ───────────────────────────────────────────────
function go(v) {
  S.srch = null; S.sq = ''; S.view = v; S.selP = null; S.step = 'form'; S.pend = null;
  ['k','s','p'].forEach(x => { const e=document.getElementById('n'+x); if(e) e.classList.toggle('a', x===v); });
  const f = document.getElementById('fab'); if(f) f.style.background = v==='w' ? 'var(--gd)' : 'var(--g)';
  render();
}

// ─── Search overlay ───────────────────────────────────────────
function openS(slot) {
  S.srch = slot; S.sq = '';
  document.getElementById('mc').innerHTML = bSrch();
  setTimeout(() => { fillList(); const i=document.getElementById('si'); if(i) i.focus(); }, 30);
}
function closeS() { S.srch = null; S.sq = ''; render(); }
function pick(id) {
  if(S.srch==='p1') S.p1=id; else S.p2=id;
  if(S.p1===S.p2) { if(S.srch==='p1') S.p2=null; else S.p1=null; }
  S.wid=null; S.srch=null; S.sq=''; render();
}
function sFilter(q) { S.sq=q; fillList(); }
function fillList() {
  const oth=S.srch==='p1'?S.p2:S.p1, cur=S.srch==='p1'?S.p1:S.p2, q=S.sq.toLowerCase();
  const lst = [...S.players].filter(p=>p.id!==oth).filter(p=>!q||p.name.toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name));
  const el = document.getElementById('slist'); if(!el) return;
  el.innerHTML = lst.map(p => `<div class="pi" onclick="pick('${p.id}')" ${p.id===cur?'style="border-color:var(--o);background:var(--ol)"':''}>
    <div class="av">${ini(p.name)}</div><div class="rii"><div class="rname">${p.name}</div></div>
    ${p.id===cur?'<span style="color:var(--o);font-size:18px">✓</span>':''}
  </div>`).join('') || '<div class="empty">Geen resultaten</div>';
}
function clearP(s) { if(s==='p1') S.p1=null; else S.p2=null; S.wid=null; render(); }

// ─── Match flow ───────────────────────────────────────────────
function setW(id) { S.wid=id; render(); }

function prep() {
  const p1=S.players.find(p=>p.id===S.p1), p2=S.players.find(p=>p.id===S.p2);
  if(!p1||!p2) { toast('Selecteer twee spelers'); return; }
  if(!S.wid) { toast('Selecteer de winnaar'); return; }
  const w=p1.id===S.wid?p1:p2, l=w===p1?p2:p1;
  const d = Math.round(K*(1-1/(1+Math.pow(10,(l.elo-w.elo)/400))));
  S.pend = { wid:w.id, lid:l.id, wn:w.name, ln:l.name, we:w.elo, le:l.elo, ww:w.wins, ll:l.losses, d };
  S.step = 'confirm'; render();
}

async function ok() {
  const m = S.pend;
  const btn = document.querySelector('.btn[onclick="ok()"]');
  if(btn) btn.disabled = true;
  try {
    await dbSaveMatch(m.wid, m.lid, m.we+m.d, Math.max(200,m.le-m.d), m.ww+1, m.ll+1, m.d);
    await dbLoad();
    const name=m.wn, d=m.d;
    S.step='form'; S.pend=null; S.p1=null; S.p2=null; S.wid=null;
    toast(`+${d} ELO voor ${name}!`);
    render();
  } catch(e) {
    toast('Fout: ' + e.message);
    if(btn) btn.disabled = false;
  }
}

function cancel() { S.step='form'; S.pend=null; render(); }

// ─── Undo ─────────────────────────────────────────────────────
async function undo() {
  const last = S.matches[0]; if(!last) { toast('Geen wedstrijd om ongedaan te maken'); return; }
  if(!confirm('Laatste wedstrijd ongedaan maken?')) return;
  const w = S.players.find(p=>p.id===last.wid);
  const l = S.players.find(p=>p.id===last.lid);
  if(!w||!l) return;
  try {
    await dbUndoMatch(last.id, w.id, l.id, w.elo-last.d, l.elo+last.d, Math.max(0,w.wins-1), Math.max(0,l.losses-1));
    await dbLoad();
    toast('Wedstrijd ongedaan gemaakt');
    render();
  } catch(e) { toast('Fout: ' + e.message); }
}

// ─── Stats ────────────────────────────────────────────────────
function streak(pid) {
  const ms=[...S.matches].filter(m=>m.wid===pid||m.lid===pid).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let mx=0,c=0; ms.forEach(m=>{m.wid===pid?(c++,mx=Math.max(mx,c)):c=0;}); return mx;
}
function weekElo(pid) {
  const w=Date.now()-7*24*60*60*1000;
  return S.matches.filter(m=>new Date(m.date)>=w&&(m.wid===pid||m.lid===pid)).reduce((s,m)=>m.wid===pid?s+m.d:s-m.d,0);
}
function h2h(a,b) {
  const ms=S.matches.filter(m=>(m.wid===a&&m.lid===b)||(m.wid===b&&m.lid===a));
  return { t:ms.length, aw:ms.filter(m=>m.wid===a).length, bw:ms.filter(m=>m.wid===b).length, ms:ms.slice(0,5) };
}

// ─── Players ──────────────────────────────────────────────────
function goP(id) { if(S.view==='k') S.view='p'; S.selP=id; render(); }

async function addP() {
  const i=document.getElementById('nn'), n=i?.value?.trim();
  if(!n) { toast('Vul een naam in'); return; }
  if(S.players.find(p=>p.name.toLowerCase()===n.toLowerCase())) { toast('Bestaat al'); return; }
  try {
    const p = await dbAddPlayer(n);
    S.players.push({ id:p.id, name:p.name, elo:p.elo, wins:p.wins, losses:p.losses });
    i.value = '';
    toast(n+' toegevoegd!'); render();
  } catch(e) { toast('Fout: '+e.message); }
}

async function delP(id) {
  const p = S.players.find(x=>x.id===id); if(!p) return;
  if(p.wins+p.losses>0 && !confirm(p.name+' verwijderen?')) return;
  try {
    await dbDeletePlayer(id);
    await dbLoad();
    S.selP = null; toast(p.name+' verwijderd'); render();
  } catch(e) { toast('Fout: '+e.message); }
}

function filterP(q) {
  const el=document.getElementById('plist'); if(!el) return;
  const s=sorted(), a=[...S.players].sort((x,y)=>x.name.localeCompare(y.name));
  const f = q ? a.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())) : a;
  el.innerHTML = f.map(p=>{const r=s.findIndex(x=>x.id===p.id)+1,t=p.wins+p.losses;
    return`<div class="pi" onclick="goP('${p.id}')"><div class="av">${ini(p.name)}</div>
    <div class="rii"><div class="rname">${p.name}</div><div class="rsub">#${r} · ${p.wins}W ${p.losses}V${!t?' · inactief':''}</div></div>
    <div class="elo">${p.elo}</div></div>`;}).join('') || '<div class="empty">Niet gevonden</div>';
}

// ─── Build views ──────────────────────────────────────────────
function bSrch() {
  return `<div class="srch-hdr">
    <button class="back" onclick="closeS()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Terug</button>
    <div class="lbl">${S.srch==='p1'?'Kies speler 1':'Kies speler 2'}</div>
    <input id="si" type="search" placeholder="Zoek op naam..." oninput="sFilter(this.value)" autocomplete="off">
  </div><div id="slist" style="margin-top:8px"></div>`;
}

function bK() {
  const act = active();
  return `<div class="lbl">${act.length} actieve spelers</div>
  ${!act.length ? '<div class="empty">Nog geen wedstrijden.<br>Tik op de groene knop!</div>' :
    act.map((p,i) => { const pos=i+1, nc=pos===1?'t1':pos===2?'t2':pos===3?'t3':'';
      const medal=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':'';
      const tot=p.wins+p.losses, pct=tot?Math.round(p.wins/tot*100):0;
      return `<div class="ri" onclick="goP('${p.id}')"><div class="rn ${nc}">${medal||pos}</div>
      <div class="av">${ini(p.name)}</div><div class="rii"><div class="rname">${p.name}</div>
      <div class="rsub">${p.wins}W · ${p.losses}V · ${pct}%</div></div><div class="elo">${p.elo}</div></div>`;
    }).join('')}`;
}

function bW() {
  const p1=S.players.find(p=>p.id===S.p1), p2=S.players.find(p=>p.id===S.p2);
  const lw=S.matches[0]?S.players.find(p=>p.id===S.matches[0].wid):null;
  const ll=S.matches[0]?S.players.find(p=>p.id===S.matches[0].lid):null;
  return `${lw&&ll?`<div class="ub"><div style="flex:1;font-size:12px;color:var(--m)">Laatste: <strong style="color:var(--n)">${lw.name}</strong> won van ${ll.name}</div>
    <button class="ubtn" onclick="undo()">↩ Ongedaan</button></div>`:''}
  <div class="lbl">Nieuwe wedstrijd</div>
  <div class="card">
    <div style="margin-bottom:12px">
      <div class="plbl">Speler 1</div>
      <div class="pp ${p1?'f':''}" onclick="openS('p1')">
        ${p1?`<span style="flex:1;font-size:14px;color:var(--n);font-weight:500">${p1.name}</span>
          <button onclick="event.stopPropagation();clearP('p1')" style="border:none;background:none;color:var(--od);cursor:pointer;font-size:18px;padding:0 0 0 8px">×</button>`
        :`<span style="flex:1;font-size:14px;color:var(--m)">— kies speler —</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--m)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`}
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div class="plbl">Speler 2</div>
      <div class="pp ${p2?'f':''}" onclick="openS('p2')">
        ${p2?`<span style="flex:1;font-size:14px;color:var(--n);font-weight:500">${p2.name}</span>
          <button onclick="event.stopPropagation();clearP('p2')" style="border:none;background:none;color:var(--od);cursor:pointer;font-size:18px;padding:0 0 0 8px">×</button>`
        :`<span style="flex:1;font-size:14px;color:var(--m)">— kies speler —</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--m)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`}
      </div>
    </div>
    ${p1&&p2?`<div class="lbl">Wie heeft gewonnen?</div>
      <div class="wr">
        <button class="wb ${S.wid===p1.id?'s':''}" onclick="setW('${p1.id}')">${p1.name}</button>
        <button class="wb ${S.wid===p2.id?'s':''}" onclick="setW('${p2.id}')">${p2.name}</button>
      </div>`:'<div style="font-size:12px;color:var(--m);margin-bottom:12px">Selecteer eerst twee spelers</div>'}
    <button class="btn" onclick="prep()" ${!p1||!p2||!S.wid?'disabled':''}>Doorgaan →</button>
  </div>
  ${S.matches.slice(0,6).length?`<div class="lbl">Recente wedstrijden</div>
    ${S.matches.slice(0,6).map(m=>{const w=S.players.find(p=>p.id===m.wid),l=S.players.find(p=>p.id===m.lid);
      const ds=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return`<div class="mi"><div><div style="font-size:12px;color:var(--n);font-weight:500"><strong>${w?.name||'?'}</strong> vs ${l?.name||'?'}</div>
      <div style="font-size:10px;color:var(--m);margin-top:1px">${ds} · <span style="color:var(--o);font-weight:600">+${m.d} ELO</span></div></div>
      <span class="badge bw">Gewon.</span></div>`;}).join('')}`:''}`;
}

function bConf() {
  const m=S.pend, nwe=m.we+m.d, nle=Math.max(200,m.le-m.d);
  return `<div class="cw">
    <svg width="64" height="64" viewBox="0 0 64 64" style="margin-bottom:16px">
      <circle cx="32" cy="32" r="30" fill="#111"/><circle cx="32" cy="26" r="16" fill="white"/>
      <circle cx="32" cy="26" r="8" fill="#111"/>
      <text x="32" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="sans-serif">8</text>
    </svg>
    <div style="font-size:22px;font-weight:700;color:var(--n);margin-bottom:4px">${m.wn} wint!</div>
    <div style="font-size:14px;color:var(--m);margin-bottom:16px">van ${m.ln}</div>
    <div class="cc">
      <div class="cx">
        <div class="av" style="background:var(--gl);color:var(--gd);margin:0 auto 6px">${ini(m.wn)}</div>
        <div style="font-size:12px;font-weight:600;color:var(--n);margin-bottom:4px">${m.wn}</div>
        <div style="font-size:11px;color:var(--m)">${m.we} → <strong style="color:var(--gd)">${nwe}</strong></div>
        <div style="font-size:11px;color:var(--gd);font-weight:700;margin-top:3px">+${m.d} ELO</div>
      </div>
      <div class="cx">
        <div class="av" style="background:var(--c);color:var(--m);margin:0 auto 6px">${ini(m.ln)}</div>
        <div style="font-size:12px;font-weight:600;color:var(--n);margin-bottom:4px">${m.ln}</div>
        <div style="font-size:11px;color:var(--m)">${m.le} → <strong style="color:#b91c1c">${nle}</strong></div>
        <div style="font-size:11px;color:#b91c1c;font-weight:700;margin-top:3px">-${m.d} ELO</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;width:100%">
      <button class="obtn" onclick="cancel()" style="flex:1">Annuleer</button>
      <button class="btn" onclick="ok()" style="flex:2">Bevestig ✓</button>
    </div>
  </div>`;
}

function bS() {
  const act = active();
  if(!act.length) return '<div class="empty">Nog geen wedstrijden gespeeld.</div>';
  const top = act.reduce((a,b)=>(a.wins+a.losses)>(b.wins+b.losses)?a:b);
  const topStr = act.map(p=>({p,s:streak(p.id)})).sort((a,b)=>b.s-a.s)[0];
  const movers = act.map(p=>({p,c:weekElo(p.id)})).filter(x=>x.c!==0).sort((a,b)=>b.c-a.c);
  const topUp=movers[0], topDn=movers[movers.length-1];
  const sp = [...S.players].sort((a,b)=>a.name.localeCompare(b.name));
  const p1=S.h1?S.players.find(p=>p.id===S.h1):null;
  const p2=S.h2?S.players.find(p=>p.id===S.h2):null;
  const hh=p1&&p2?h2h(p1.id,p2.id):null;
  return `<div class="lbl">Hoogtepunten</div>
  ${topStr?.s>0?`<div class="sh"><div class="si" style="background:#fff8e1">🔥</div>
    <div><div style="font-size:10px;color:var(--m);font-weight:600;text-transform:uppercase">Langste winserie ooit</div>
    <div style="font-size:15px;font-weight:600;color:var(--n)">${topStr.p.name}</div>
    <div style="font-size:11px;color:var(--m)">${topStr.s} op rij gewonnen</div></div></div>`:''}
  <div class="sh"><div class="si" style="background:var(--ol)">🎱</div>
    <div><div style="font-size:10px;color:var(--m);font-weight:600;text-transform:uppercase">Meest actief</div>
    <div style="font-size:15px;font-weight:600;color:var(--n)">${top.name}</div>
    <div style="font-size:11px;color:var(--m)">${top.wins+top.losses} wedstrijden gespeeld</div></div></div>
  ${topUp?.c>0?`<div class="sh"><div class="si" style="background:var(--gl)">📈</div>
    <div><div style="font-size:10px;color:var(--m);font-weight:600;text-transform:uppercase">Stijger van de week</div>
    <div style="font-size:15px;font-weight:600;color:var(--n)">${topUp.p.name}</div>
    <div style="font-size:11px;color:var(--m)">+${topUp.c} ELO in 7 dagen</div></div></div>`:''}
  ${topDn?.c<0?`<div class="sh"><div class="si" style="background:#fce4e4">📉</div>
    <div><div style="font-size:10px;color:var(--m);font-weight:600;text-transform:uppercase">Daler van de week</div>
    <div style="font-size:15px;font-weight:600;color:var(--n)">${topDn.p.name}</div>
    <div style="font-size:11px;color:var(--m)">${topDn.c} ELO in 7 dagen</div></div></div>`:''}
  <div class="div"></div>
  <div class="lbl">Head-to-head</div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div><div class="plbl">Speler 1</div>
        <select onchange="S.h1=this.value;render()">
          <option value="">— kies —</option>
          ${sp.map(p=>`<option value="${p.id}" ${S.h1===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select></div>
      <div><div class="plbl">Speler 2</div>
        <select onchange="S.h2=this.value;render()">
          <option value="">— kies —</option>
          ${sp.filter(p=>p.id!==S.h1).map(p=>`<option value="${p.id}" ${S.h2===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select></div>
    </div>
    ${hh&&hh.t>0?`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600;color:var(--o);flex-shrink:0">${p1.name}</span>
        <div style="flex:1;height:8px;border-radius:4px;overflow:hidden;background:var(--b);display:flex">
          <div style="width:${Math.round(hh.aw/hh.t*100)}%;background:var(--o)"></div>
          <div style="width:${Math.round(hh.bw/hh.t*100)}%;background:var(--n)"></div>
        </div>
        <span style="font-size:12px;font-weight:600;color:var(--n);flex-shrink:0">${p2.name}</span>
      </div>
      <div style="text-align:center;font-size:28px;font-weight:700;color:var(--n)">${hh.aw} – ${hh.bw}</div>
      <div style="text-align:center;font-size:11px;color:var(--m);margin-bottom:8px">${hh.t} wedstrijd${hh.t!==1?'en':''}</div>
      ${hh.ms.map(m=>{const won=m.wid===p1.id,d=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
        return`<div class="mi"><div><div style="font-size:12px;color:var(--n);font-weight:500">${won?p1.name:p2.name} won</div>
        <div style="font-size:10px;color:var(--m)">${d}</div></div>
        <span class="badge ${won?'bw':'bl'}">${won?p1.name:p2.name}</span></div>`;}).join('')}`
    :hh?'<div style="font-size:13px;color:var(--m);text-align:center;padding:8px">Nog nooit tegen elkaar gespeeld</div>'
    :'<div style="font-size:12px;color:var(--m);text-align:center;padding:8px">Selecteer twee spelers</div>'}
  </div>`;
}

function bP() {
  if(S.selP) {
    const p=S.players.find(x=>x.id===S.selP); if(!p){S.selP=null;return bP();}
    const r=sorted().findIndex(x=>x.id===p.id)+1, tot=p.wins+p.losses, pct=tot?Math.round(p.wins/tot*100):0;
    const pm=S.matches.filter(m=>m.wid===p.id||m.lid===p.id).slice(0,10), str=streak(p.id);
    return `<button class="back" onclick="S.selP=null;render()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Terug</button>
    <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--ol);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--od);flex-shrink:0">${ini(p.name)}</div>
      <div style="flex:1"><div style="font-size:16px;font-weight:600;color:var(--n)">${p.name}</div>
      <div style="font-size:12px;color:var(--m);margin-top:2px">Rang #${r} van ${S.players.length}</div></div>
      <button class="dbtn" onclick="delP('${p.id}')">Verwijder</button>
    </div>
    <div class="sg">
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--o)">${p.elo}</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">ELO</div></div>
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--n)">${p.wins}</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">Gewon.</div></div>
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--n)">${p.losses}</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">Verloren</div></div>
    </div>
    <div class="sg">
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--n)">${tot}</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">Gespeeld</div></div>
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--n)">${pct}%</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">Winratio</div></div>
      <div class="sb"><div style="font-size:20px;font-weight:600;color:var(--n)">${str}</div><div style="font-size:10px;color:var(--m);margin-top:2px;text-transform:uppercase">Beste serie</div></div>
    </div>
    <div class="lbl" style="margin-top:4px">Wedstrijdhistorie</div>
    ${pm.length?pm.map(m=>{const won=m.wid===p.id,opp=S.players.find(x=>x.id===(won?m.lid:m.wid));
      const d=new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
      return`<div class="mi"><div><div style="font-size:12px;color:var(--n);font-weight:500">vs ${opp?.name||'?'}</div>
      <div style="font-size:10px;color:var(--m);margin-top:1px">${d} · ${won?'+':'-'}${m.d} ELO</div></div>
      <span class="badge ${won?'bw':'bl'}">${won?'Gewon.':'Verlor.'}</span></div>`;}).join('')
    :'<div class="empty">Nog geen wedstrijden</div>'}`;
  }
  const s=sorted(), a=[...S.players].sort((x,y)=>x.name.localeCompare(y.name));
  return `<div class="lbl">Spelersbeheer · ${S.players.length} spelers</div>
  <div class="card" style="margin-bottom:10px">
    <div class="lbl">Nieuwe speler</div>
    <div class="ar">
      <input type="text" id="nn" placeholder="Voornaam (+ initiaal indien nodig)" onkeydown="if(event.key==='Enter')addP()">
      <button class="btn" style="width:auto;padding:9px 14px;flex-shrink:0" onclick="addP()">+</button>
    </div>
  </div>
  <input type="search" placeholder="Zoek speler..." style="margin-bottom:8px" oninput="filterP(this.value)">
  <div id="plist">
    ${a.map(p=>{const r=s.findIndex(x=>x.id===p.id)+1,t=p.wins+p.losses;
      return`<div class="pi" onclick="goP('${p.id}')"><div class="av">${ini(p.name)}</div>
      <div class="rii"><div class="rname">${p.name}</div><div class="rsub">#${r} · ${p.wins}W ${p.losses}V${!t?' · inactief':''}</div></div>
      <div class="elo">${p.elo}</div></div>`;}).join('')}
  </div>`;
}

// ─── Render ───────────────────────────────────────────────────
function render() {
  const cnt=document.getElementById('mc-count');
  if(cnt) cnt.textContent = S.matches.length ? S.matches.length+'×' : '';
  const f=document.getElementById('fab'); if(f) f.style.background=S.view==='w'?'var(--gd)':'var(--g)';
  ['k','s','p'].forEach(x=>{const e=document.getElementById('n'+x);if(e)e.classList.toggle('a',x===S.view);});
  if(S.srch) {
    document.getElementById('mc').innerHTML = bSrch();
    setTimeout(()=>{fillList();const i=document.getElementById('si');if(i)i.focus();},30);
    return;
  }
  const c=document.getElementById('mc');
  if(S.view==='k') c.innerHTML=bK();
  else if(S.view==='w') c.innerHTML=S.step==='confirm'?bConf():bW();
  else if(S.view==='s') c.innerHTML=bS();
  else c.innerHTML=bP();
}

// ─── Boot ─────────────────────────────────────────────────────
async function init() {
  if(SUPABASE_URL === 'JOUW_SUPABASE_URL_HIER') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('cfg').style.display = 'flex';
    return;
  }
  try {
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await dbSeed();
    await dbLoad();
    hideLoading();
    render();
  } catch(e) {
    document.getElementById('loading').querySelector('p').textContent = 'Verbindingsfout: ' + e.message;
  }
}

init();
</script>
</body>
</html>
