<script>
// ─── Supabase init ───────────────────────────────────────────
const { createClient } = supabase;
let db = null;

function checkConfig() {
  return SUPABASE_URL !== 'JOUW_SUPABASE_URL_HIER' && SUPABASE_ANON_KEY !== 'JOUW_SUPABASE_ANON_KEY_HIER';
}

// ─── State ───────────────────────────────────────────────────
const INITIAL_ELO = 1200;
const K = 32;
const DEFAULT_NAMES = ["Anouk Zijlstra","Arjen Krist","David Fuhri","Dennis Meegdes","Dorte Rotteveel","Elise Oostenbrink","Femke Kapteijn","Ferry Witting","Floortje Cieraad","Fyodor Onck","Gert Jan Borst","Giovanni van Raam","Hans Jorritsma","Jacob Polak","Jacques Stuart","Jasper de Wit","Jasper Sonneveld","Jelle Bruns","Jesse Brandt","Jesse van Zuijlen","Jesse Warnaar","Joram Withagen","Judith Ekamper","Kirsten Pieters","Kitty van Zanten","Koen van Oosterhout","Laith Alzaher","Laurens Schrijver","Lizzy van der Beek","Lotfy Aly","Mara Oldewelt","Mark Officier","Mark Stoffers","Marvin van Kanten","Max Wiercx","Michel Verwoolde","Myrthe van der Lugt","Natasja Ooms","Nicholas Been","Niels de Lange","Niels Helmer","Ott Croll","Pieter de Rooij","Redginald Mones","Roan Hamminga","Robbert Leemans","Robbert van Staveren","Roland Reen","Rolf de Boer","Ruben van Weesep","Ruurd IJpma","Sasha Leemans","Stan de Rover","Thijs Witteveen","Ties Keurentjes","Tim ten Berge","Tjalling Veldhuis","Tom Bollemeijer","Veronique va der Steen","Wesley Jongerius","Wouter Lindenbergh","Alexander vd Berg v S.","Allard Mark Ebbers","Dick Waterink","Douwe Eijssen","Esmée Schuzsler","Ileen van den Berg","John Visée","Kees van der Sar","Kelly Stor","Nick van den Berg","Nicole Schouwenaar","Philine Goldbohm","Saar Calame","Sander Zuyderwijk","Yashica Peperkamp","Rob Vos"];

let state = { players: [], matches: [], view: 'klassement', selectedPlayer: null };

// ─── Helpers ─────────────────────────────────────────────────
function initials(n) {
  return n.split(' ').filter(Boolean).slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
}
function getSorted() {
  return [...state.players].sort((a, b) => b.elo - a.elo);
}
function getActive() {
  return getSorted().filter(p => p.wins + p.losses > 0);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2500);
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ─── Supabase DB calls ───────────────────────────────────────
async function loadFromDB() {
  const [{ data: players }, { data: matches }] = await Promise.all([
    db.from('players').select('*').order('elo', { ascending: false }),
    db.from('matches').select('*').order('created_at', { ascending: false }).limit(100)
  ]);
  state.players = (players || []).map(p => ({
    id: p.id, name: p.name, elo: p.elo, wins: p.wins, losses: p.losses
  }));
  state.matches = (matches || []).map(m => ({
    id: m.id, winnerId: m.winner_id, loserId: m.loser_id, delta: m.delta, date: m.created_at
  }));
}

async function seedPlayers() {
  // Only seed if no players exist
  const { data } = await db.from('players').select('id').limit(1);
  if (data && data.length > 0) return;
  const rows = DEFAULT_NAMES.map(name => ({ name, elo: INITIAL_ELO, wins: 0, losses: 0 }));
  await db.from('players').insert(rows);
}

async function saveMatch(winnerId, loserId, newWinnerElo, newLoserElo, delta) {
  // Update ELO scores
  await Promise.all([
    db.from('players').update({ elo: newWinnerElo, wins: db.raw ? undefined : undefined }).eq('id', winnerId),
    db.from('players').update({ elo: newLoserElo }).eq('id', loserId)
  ]);
  // Update wins/losses separately to be safe
  const winner = state.players.find(p => p.id === winnerId);
  const loser = state.players.find(p => p.id === loserId);
  await Promise.all([
    db.from('players').update({ elo: newWinnerElo, wins: winner.wins + 1 }).eq('id', winnerId),
    db.from('players').update({ elo: newLoserElo, losses: loser.losses + 1 }).eq('id', loserId)
  ]);
  // Insert match record
  await db.from('matches').insert({ winner_id: winnerId, loser_id: loserId, delta });
}

async function saveNewPlayer(name) {
  const { data, error } = await db.from('players').insert({ name, elo: INITIAL_ELO, wins: 0, losses: 0 }).select().single();
  if (error) throw error;
  return data;
}

async function deletePlayer(id) {
  await Promise.all([
    db.from('matches').delete().or(`winner_id.eq.${id},loser_id.eq.${id}`),
    db.from('players').delete().eq('id', id)
  ]);
}

async function resetAllData() {
  await db.from('matches').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  await db.from('players').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  const rows = DEFAULT_NAMES.map(name => ({ name, elo: INITIAL_ELO, wins: 0, losses: 0 }));
  await db.from('players').insert(rows);
}

// ─── UI Actions ──────────────────────────────────────────────
function switchView(v) {
  state.view = v; state.selectedPlayer = null;
  document.getElementById('nav-klassement').classList.toggle('active', v === 'klassement');
  document.getElementById('nav-spelers').classList.toggle('active', v === 'spelers');
  document.getElementById('fab-btn').style.background = v === 'wedstrijd' ? 'var(--green-d)' : 'var(--green)';
  render();
}
function selectPlayer(id) { state.selectedPlayer = id; render(); }
function backFromPlayer() { state.selectedPlayer = null; render(); }

function onSelectChange(elId) {
  const el = document.getElementById(elId);
  if (el) el.classList.toggle('has-value', !!el.value);
  if (elId === 'sel-p1') {
    const v = el?.value;
    const p2 = document.getElementById('sel-p2');
    if (p2) Array.from(p2.options).forEach(o => { o.disabled = o.value && o.value === v; });
  }
  updateWinnerButtons();
}

function updateWinnerButtons() {
  const p1id = document.getElementById('sel-p1')?.value;
  const p2id = document.getElementById('sel-p2')?.value;
  const wc = document.getElementById('winner-container');
  if (!wc) return;
  const p1 = state.players.find(p => p.id === p1id);
  const p2 = state.players.find(p => p.id === p2id);
  wc.innerHTML = p1 && p2 ? `
    <div class="section-label">Wie heeft gewonnen?</div>
    <div class="winner-row">
      <button class="winner-btn" data-id="${p1.id}" onclick="winnerSelect('${p1.id}')">${p1.name}</button>
      <button class="winner-btn" data-id="${p2.id}" onclick="winnerSelect('${p2.id}')">${p2.name}</button>
    </div>` : `<div style="font-size:12px;color:var(--mid);padding:4px 0">Selecteer eerst twee spelers</div>`;
}

function winnerSelect(id) {
  document.querySelectorAll('.winner-btn').forEach(b => b.classList.toggle('selected', b.dataset.id === id));
}

async function submitMatch() {
  const p1id = document.getElementById('sel-p1')?.value;
  const p2id = document.getElementById('sel-p2')?.value;
  const winId = document.querySelector('.winner-btn.selected')?.dataset?.id;
  if (!p1id || !p2id || !winId || p1id === p2id) { showToast('Selecteer twee spelers en een winnaar'); return; }
  const loseId = winId === p1id ? p2id : p1id;
  const winner = state.players.find(p => p.id === winId);
  const loser = state.players.find(p => p.id === loseId);
  const exp = 1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));
  const delta = Math.round(K * (1 - exp));
  const newWinElo = winner.elo + delta;
  const newLoseElo = Math.max(200, loser.elo - delta);

  const btn = document.querySelector('.primary-btn');
  if (btn) btn.disabled = true;
  try {
    await saveMatch(winId, loseId, newWinElo, newLoseElo, delta);
    await loadFromDB();
    showToast('+' + delta + ' ELO voor ' + winner.name.split(' ')[0] + '!');
    render();
  } catch(e) {
    showToast('Fout bij opslaan: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function addPlayer() {
  const inp = document.getElementById('new-player-name');
  const name = inp?.value?.trim();
  if (!name) { showToast('Vul een naam in'); return; }
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { showToast('Speler bestaat al'); return; }
  try {
    const p = await saveNewPlayer(name);
    state.players.push({ id: p.id, name: p.name, elo: p.elo, wins: p.wins, losses: p.losses });
    showToast(name + ' toegevoegd!');
    render();
  } catch(e) { showToast('Fout: ' + e.message); }
}

async function removePlayer(id) {
  const p = state.players.find(x => x.id === id);
  if (!p) return;
  if (p.wins + p.losses > 0 && !confirm(p.name + ' heeft al wedstrijden gespeeld. Toch verwijderen?')) return;
  try {
    await deletePlayer(id);
    await loadFromDB();
    state.selectedPlayer = null;
    showToast(p.name + ' verwijderd');
    render();
  } catch(e) { showToast('Fout: ' + e.message); }
}

async function resetAll() {
  if (!confirm('Alle data verwijderen en opnieuw beginnen?')) return;
  try {
    showToast('Bezig met resetten...');
    await resetAllData();
    await loadFromDB();
    showToast('Data gereset');
    render();
  } catch(e) { showToast('Fout: ' + e.message); }
}

function filterPlayers(q) {
  q = q.toLowerCase();
  const alpha = [...state.players].sort((a, b) => a.name.localeCompare(b.name));
  const eloS = getSorted();
  const list = document.getElementById('player-list');
  if (!list) return;
  const f = q ? alpha.filter(p => p.name.toLowerCase().includes(q)) : alpha;
  list.innerHTML = f.map(p => {
    const rank = eloS.findIndex(x => x.id === p.id) + 1, total = p.wins + p.losses;
    return `<div class="player-item" onclick="selectPlayer('${p.id}')">
      <div class="rank-avatar">${initials(p.name)}</div>
      <div class="rank-info"><div class="rank-name">${p.name}</div>
      <div class="rank-sub">#${rank} · ${p.wins}W ${p.losses}V${!total ? ' · nog niet gespeeld' : ''}</div></div>
      <div class="rank-elo">${p.elo}</div>
    </div>`;
  }).join('') || '<div class="empty">Geen spelers gevonden</div>';
}

// ─── Render ──────────────────────────────────────────────────
function render() {
  const sorted = getSorted(), active = getActive();
  const mc = document.getElementById('match-count');
  if (mc) mc.textContent = state.matches.length ? state.matches.length + '×' : '';
  const c = document.getElementById('main-content');

  if (state.view === 'klassement') {
    c.innerHTML = `
      <div class="section-label">${active.length} actieve spelers</div>
      ${active.length === 0 ? '<div class="empty">Nog geen wedstrijden gespeeld.<br>Tik op de groene knop om te beginnen!</div>' :
        active.map((p, i) => {
          const pos = i + 1, nc = pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';
          const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
          const total = p.wins + p.losses, pct = total ? Math.round(p.wins / total * 100) : 0;
          return `<div class="rank-item" onclick="selectPlayer('${p.id}')">
            <div class="rank-num ${nc}">${medal || pos}</div>
            <div class="rank-avatar">${initials(p.name)}</div>
            <div class="rank-info"><div class="rank-name">${p.name}</div>
            <div class="rank-sub">${p.wins}W · ${p.losses}V · ${pct}%</div></div>
            <div class="rank-elo">${p.elo}</div>
          </div>`;
        }).join('')}
      <div style="padding:12px 0"><span class="reset-link" onclick="resetAll()">⚙ Alle data resetten</span></div>`;

  } else if (state.view === 'wedstrijd') {
    const opts = [...state.players].sort((a, b) => a.name.localeCompare(b.name))
      .map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    c.innerHTML = `
      <div class="section-label">Nieuwe wedstrijd invoeren</div>
      <div class="section-card">
        <div class="player-select-wrap">
          <label for="sel-p1">Speler 1</label>
          <select id="sel-p1" onchange="onSelectChange('sel-p1')"><option value="">— kies speler —</option>${opts}</select>
        </div>
        <div class="player-select-wrap">
          <label for="sel-p2">Speler 2</label>
          <select id="sel-p2" onchange="onSelectChange('sel-p2')"><option value="">— kies speler —</option>${opts}</select>
        </div>
        <div id="winner-container" style="margin-bottom:12px">
          <div style="font-size:12px;color:var(--mid);padding:4px 0">Selecteer eerst twee spelers</div>
        </div>
        <button class="primary-btn" onclick="submitMatch()">Wedstrijd opslaan</button>
      </div>
      ${state.matches.length ? `
        <div class="section-label">Recente wedstrijden</div>
        ${state.matches.slice(0, 10).map(m => {
          const w = state.players.find(p => p.id === m.winnerId);
          const l = state.players.find(p => p.id === m.loserId);
          const ds = new Date(m.date).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          return `<div class="match-item">
            <div><div class="match-names"><strong>${w?.name || '?'}</strong> vs ${l?.name || '?'}</div>
            <div class="match-date">${ds} &nbsp;·&nbsp; <span style="color:var(--orange);font-weight:600">+${m.delta} ELO</span></div></div>
            <span class="badge badge-win">Gewon.</span>
          </div>`;
        }).join('')}` : ''}`;

  } else if (state.view === 'spelers') {
    if (state.selectedPlayer) {
      const p = state.players.find(x => x.id === state.selectedPlayer);
      if (!p) { state.selectedPlayer = null; render(); return; }
      const rank = sorted.findIndex(x => x.id === p.id) + 1;
      const total = p.wins + p.losses, pct = total ? Math.round(p.wins / total * 100) : 0;
      const pm = state.matches.filter(m => m.winnerId === p.id || m.loserId === p.id).slice(0, 10);
      c.innerHTML = `
        <button class="detail-back" onclick="backFromPlayer()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Terug
        </button>
        <div class="section-card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="width:48px;height:48px;border-radius:50%;background:var(--orange-l);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--orange-d);flex-shrink:0">${initials(p.name)}</div>
          <div style="flex:1"><div style="font-size:16px;font-weight:600;color:var(--navy)">${p.name}</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px">Rang #${rank} van ${state.players.length}</div></div>
          <button class="danger-btn" onclick="removePlayer('${p.id}')">Verwijder</button>
        </div>
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-val" style="color:var(--orange)">${p.elo}</div><div class="stat-lbl">ELO</div></div>
          <div class="stat-box"><div class="stat-val">${p.wins}</div><div class="stat-lbl">Gewon.</div></div>
          <div class="stat-box"><div class="stat-val">${p.losses}</div><div class="stat-lbl">Verloren</div></div>
        </div>
        <div class="stat-grid" style="grid-template-columns:1fr 1fr">
          <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Gespeeld</div></div>
          <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Winratio</div></div>
        </div>
        <div class="section-label" style="margin-top:4px">Wedstrijdhistorie</div>
        ${pm.length ? pm.map(m => {
          const won = m.winnerId === p.id;
          const opp = state.players.find(x => x.id === (won ? m.loserId : m.winnerId));
          const d = new Date(m.date).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
          return `<div class="match-item">
            <div><div class="match-names">vs ${opp?.name || 'onbekend'}</div>
            <div class="match-date">${d} &nbsp;·&nbsp; ${won ? '+' : '−'}${m.delta} ELO</div></div>
            <span class="badge ${won ? 'badge-win' : 'badge-loss'}">${won ? 'Gewon.' : 'Verlor.'}</span>
          </div>`;
        }).join('') : '<div class="empty">Nog geen wedstrijden gespeeld</div>'}`;
    } else {
      const alpha = [...state.players].sort((a, b) => a.name.localeCompare(b.name));
      c.innerHTML = `
        <div class="section-label">Spelersbeheer · ${state.players.length} spelers</div>
        <div class="section-card" style="margin-bottom:10px">
          <div class="section-label">Nieuwe speler</div>
          <div class="add-row">
            <input type="text" id="new-player-name" placeholder="Voor- en achternaam" onkeydown="if(event.key==='Enter')addPlayer()"/>
            <button class="primary-btn" style="width:auto;padding:9px 14px;flex-shrink:0" onclick="addPlayer()">+ Voeg toe</button>
          </div>
        </div>
        <input type="search" placeholder="Zoek speler..." class="search-input" oninput="filterPlayers(this.value)"/>
        <div id="player-list">
          ${alpha.map(p => {
            const rank = sorted.findIndex(x => x.id === p.id) + 1, total = p.wins + p.losses;
            return `<div class="player-item" onclick="selectPlayer('${p.id}')">
              <div class="rank-avatar">${initials(p.name)}</div>
              <div class="rank-info"><div class="rank-name">${p.name}</div>
              <div class="rank-sub">#${rank} · ${p.wins}W ${p.losses}V${!total ? ' · nog niet gespeeld' : ''}</div></div>
              <div class="rank-elo">${p.elo}</div>
            </div>`;
          }).join('')}
        </div>`;
    }
  }
}

// ─── Boot ────────────────────────────────────────────────────
async function init() {
  if (!checkConfig()) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('config-notice').style.display = 'flex';
    return;
  }
  try {
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await seedPlayers();
    await loadFromDB();
    hideLoading();
    render();
  } catch(e) {
    document.getElementById('loading-overlay').querySelector('p').textContent = 'Verbindingsfout: ' + e.message;
  }
}

init();
</script>
</body>
</html>
