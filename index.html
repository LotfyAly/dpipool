/* ═══════════════════════════════════════════════
   MOBILE FIXES — comprehensive touch & readability

input[type=search],
select { font-size: 16px !important; min-height: 48px; padding: 12px 14px; }
select { padding-right: 36px; }

/* Ki ranking rows — more breathing room */
.ki { padding: 13px 14px; min-height: 60px; }

.ki.r2 { padding: 17px 14px; }
.ki.r3 { padding: 14px 14px; }

/* Ki name — bigger on small screens */
.ki-name { font-size: 15px !important; }
.ki-name-row2 { font-size: 12px !important; }
.ki-elo { font-size: 15px !important; }

/* Stat grid — don't squeeze */
.sg { gap: 6px; }
.sb { padding: 14px 8px; }
.sb .sv { font-size: 22px; }

/* Cards — enough padding */
.card { padding: 16px; margin-bottom: 12px; }
.sh { padding: 14px 12px; gap: 12px; }

/* Winner buttons — full height, easy to tap */
.wr { gap: 10px; margin-bottom: 16px; }
.wb { padding: 16px 8px; font-size: 14px; min-height: 56px; }

/* Queue list items */
.qi-row { min-height: 56px; padding: 12px 14px; }

/* Modal — full width on mobile, safe padding */
.modal-box { 
  padding: 24px 20px max(32px, env(safe-area-inset-bottom, 32px));
  border-radius: 16px 16px 0 0;
}
.modal-cancel, .modal-confirm { min-height: 48px; font-size: 15px; }

/* Back button — bigger hit area */
.back { padding: 8px 0; margin-bottom: 16px; font-size: 14px; }

/* Confirm view cards */
.cc { gap: 8px; }
.cx { padding: 16px 10px; }

/* Toast — clear of nav bar */
#toast { 
  bottom: calc(74px + env(safe-area-inset-bottom, 0px)); 
  font-size: 14px;
  padding: 11px 20px;
  max-width: calc(100vw - 32px);

}

/* Content area padding */
.cnt { padding: 16px 12px 16px; }

}

<body>

<div id="toast"></div>

<script>
var _sb=supabase,ELO0=1200,K=32,PWD='Hetistijdvooreennieuwestart';
var NAMES=["Anouk","Arjen","David","Dennis","Dorte","Elise","Femke","Ferry","Floortje","Fyodor","Gert Jan","Giovanni","Hans","Jacob","Jacques","Jasper d.","Jasper S.","Jelle","Jesse B.","Jesse v.","Jesse W.","Joram","Judith","Kirsten","Kitty","Koen","Laith","Laurens","Lizzy","Lotfy","Mara","Mark O.","Mark S.","Marvin","Max","Michel","Myrthe","Natasja","Nicholas","Niels d.","Niels H.","Ott","Pieter","Redginald","Roan","Robbert L.","Robbert v.","Roland","Rolf","Ruben","Ruurd","Sasha","Stan","Thijs","Ties","Tim","Tjalling","Tom","Veronique","Wesley","Wouter","Alexander","Allard","Dick","Douwe","Esm\u00e9e","Ileen","John","Kees","Kelly","Nick","Nicole","Philine","Saar","Sander","Yashica","Rob"];
var db=null;
var S={players:[],matches:[],queue:[],view:'k',selP:null,step:'form',pend:null,p1:null,p2:null,wid:null,srch:null,sq:'',h1:'',h2:'',qSrchQ:''};

// ── Helpers ──────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function ini(n){return(n||'').split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0]||''}).join('').toUpperCase()}
function sorted(){return S.players.slice().sort(function(a,b){return b.elo-a.elo})}
function active(){return sorted().filter(function(p){return p.wins+p.losses>0})}
function find(id){for(var i=0;i<S.players.length;i++){if(S.players[i].id===id)return S.players[i]}return null}
function getActiveQueue(){return S.queue.filter(function(q){return q.status==='wachtend'||q.status==='aan_de_beurt'})}
// getPhoto moved above
function weekDelta(pid){var w=Date.now()-7*24*60*60*1000;return S.matches.filter(function(m){return new Date(m.date)>=w&&(m.wid===pid||m.lid===pid)}).reduce(function(s,m){return m.wid===pid?s+m.d:s-m.d},0)}
function arrow(pid){var d=weekDelta(pid);if(d>0)return'<span class="trend-up">&#9650; '+d+'</span>';if(d<0)return'<span class="trend-dn">&#9660; '+Math.abs(d)+'</span>';return''}
function streak(pid){var ms=S.matches.filter(function(m){return m.wid===pid||m.lid===pid}).sort(function(a,b){return new Date(a.date)-new Date(b.date)});var mx=0,c=0;ms.forEach(function(m){if(m.wid===pid){c++;if(c>mx)mx=c}else c=0});return mx}
function h2h(a,b){var ms=S.matches.filter(function(m){return(m.wid===a&&m.lid===b)||(m.wid===b&&m.lid===a)});return{t:ms.length,aw:ms.filter(function(m){return m.wid===a}).length,bw:ms.filter(function(m){return m.wid===b}).length,ms:ms.slice(0,5)}}
function toast(m){var t=document.getElementById('toast');t.innerHTML=m;t.style.opacity=1;setTimeout(function(){t.style.opacity=0},2800)}
function hideLoad(){document.getElementById('loading').style.display='none';document.getElementById('app').style.display='flex'}

// ── DB ───────────────────────────────────────────────────────
async function dbLoad(){
  var r1=await db.from('players').select('*').order('elo',{ascending:false});
  var r2=await db.from('matches').select('*').order('created_at',{ascending:false}).limit(200);
  if(r1.error)throw new Error('players: '+String(r1.error.message||r1.error));
  if(r2.error)throw new Error('matches: '+String(r2.error.message||r2.error));
  S.players=(r1.data||[]).map(function(p){return{id:p.id,name:p.name,elo:p.elo,wins:p.wins,losses:p.losses}});
  S.matches=(r2.data||[]).map(function(m){return{id:m.id,wid:m.winner_id,lid:m.loser_id,d:m.delta,date:m.created_at}});
}
async function dbLoadQueue(){
  try{
    var r=await db.from('wachtrij').select('*').in('status',['wachtend','aan_de_beurt']).order('aangemaakt_op',{ascending:true});
    S.queue=(r.data||[]);
  }catch(e){S.queue=[];}
}
async function dbSeed(){
  var r=await db.from('players').select('id').limit(1);
  if(r.error){var msg=r.error&&r.error.message?String(r.error.message):'Supabase verbinding mislukt';throw new Error(msg);}
  if(r.data&&r.data.length>0)return;
  await db.from('players').insert(NAMES.map(function(n){return{name:n,elo:ELO0,wins:0,losses:0}}));
}
async function dbAddQueue(pid){
  try{
    var already=S.queue.filter(function(q){return q.speler_id===pid&&q.status!=='klaar'});
    if(already.length)return false;
    var r=await db.from('wachtrij').insert({speler_id:pid,status:'wachtend'});
    if(r.error)throw new Error(r.error.message);
    return true;
  }catch(e){toast('Fout bij wachtrij: '+e.message);return false;}
}
async function dbRemoveQueue(id){
  try{await db.from('wachtrij').delete().eq('id',id)}catch(e){}
}
async function dbClearQueue(){
  try{await db.from('wachtrij').delete().in('status',['wachtend','aan_de_beurt'])}catch(e){}
}
function setupRealtime(){
  try{
    db.channel('wachtrij-live').on('postgres_changes',{event:'*',schema:'public',table:'wachtrij'},function(){
      dbLoadQueue().then(function(){render()}).catch(function(){});
    }).subscribe();
  }catch(e){}
}

// ── Navigation ───────────────────────────────────────────────
function go(v){
  S.srch=null;S.sq='';S.view=v;S.selP=null;S.step='form';S.pend=null;
  ['k','q','s','p'].forEach(function(x){var e=document.getElementById('n'+x);if(e){var c=e.className.replace(/\ba\b/g,'').trim();e.className=c+(x===v?' a':'')}});
  var f=document.getElementById('fab');if(f)f.style.background=v==='w'?'var(--gd)':'var(--g)';
  render();
}

// ── Player search overlay ────────────────────────────────────
function openS(slot){S.srch=slot;S.sq='';document.getElementById('mc').innerHTML=bSrch();setTimeout(function(){fillList();var i=document.getElementById('si');if(i)i.focus()},50)}
function closeS(){S.srch=null;S.sq='';render()}
function pick(id){
  if(S.srch==='p1')S.p1=id; else S.p2=id;
  if(S.p1===S.p2){if(S.srch==='p1')S.p2=null; else S.p1=null;}
  S.wid=null;S.srch=null;S.sq='';render();
}
function sFilter(q){S.sq=q;fillList()}
function fillList(){
  var oth=S.srch==='p1'?S.p2:S.p1,cur=S.srch==='p1'?S.p1:S.p2,q=S.sq.toLowerCase();
  var lst=S.players.filter(function(p){return p.id!==oth&&(!q||p.name.toLowerCase().indexOf(q)>-1)}).sort(function(a,b){return a.name.localeCompare(b.name)});
  var el=document.getElementById('slist');if(!el)return;
  el.innerHTML=lst.map(function(p){
    var photo=getPhoto(p.id);
    var av=photo?'<img src="'+photo+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bor);flex-shrink:0" alt="">':'<div class="av">'+ini(p.name)+'</div>';
    return'<div class="pi" onclick="pick(\''+p.id+'\')"'+(p.id===cur?' style="border-color:var(--o);background:var(--ol)"':'')+'>'+av+'<div class="rii"><div class="rname">'+p.name+'</div></div>'+(p.id===cur?'<span style="color:var(--o);font-size:20px;line-height:1">&#10003;</span>':'')+
    '</div>';
  }).join('')||'<div class="empty">Geen resultaten</div>';
}
function clearP(s){if(s==='p1')S.p1=null; else S.p2=null; S.wid=null;render()}
function setW(id){S.wid=id;render()}

// ── Match flow ───────────────────────────────────────────────
function prep(){
  var p1=find(S.p1),p2=find(S.p2);if(!p1||!p2){toast('Selecteer twee spelers');return}
  if(!S.wid){toast('Selecteer de winnaar');return}
  var w=p1.id===S.wid?p1:p2,l=w===p1?p2:p1;
  var d=Math.round(K*(1-1/(1+Math.pow(10,(l.elo-w.elo)/400))));
  S.pend={wid:w.id,lid:l.id,wn:w.name,ln:l.name,we:w.elo,le:l.elo,ww:w.wins,ll:l.losses,d:d};
  S.step='confirm';render();
}
async function ok(){
  var m=S.pend;
  try{
    await Promise.all([
      db.from('players').update({elo:m.we+m.d,wins:m.ww+1}).eq('id',m.wid),
      db.from('players').update({elo:Math.max(200,m.le-m.d),losses:m.ll+1}).eq('id',m.lid),
      db.from('matches').insert({winner_id:m.wid,loser_id:m.lid,delta:m.d})
    ]);
    await dbLoad();
    await dbLoadQueue();
    fireConfetti();
    var winId=m.wid,d=m.d,wn=m.wn;
    S.step='form';S.pend=null;S.wid=null;
    var nextInQueue=S.queue.length>0?find(S.queue[0].speler_id):null;
    if(nextInQueue&&nextInQueue.id!==winId){
      S.p1=winId;S.p2=nextInQueue.id;
      toast('+'+d+' ELO &middot; <strong>'+nextInQueue.name+'</strong> staat klaar &#129689;');
    } else {
      S.p1=null;S.p2=null;
      toast('+'+d+' ELO voor '+wn+'!');
    }
    render();
  }catch(e){toast('Fout: '+e.message)}
}
function cancel(){S.step='form';S.pend=null;render()}

// ── Confetti ─────────────────────────────────────────────────
function fireConfetti(){
  var host=document.getElementById('confetti-layer');
  if(!host){host=document.createElement('div');host.id='confetti-layer';document.body.appendChild(host);}
  var colors=['#e85d1a','#2a1a3e','#3aa86b','#c08a2a','#fff5dc','#a8341d','#ffffff'];
  var N=80;
  var W=window.innerWidth;
  for(var i=0;i<N;i++){
    var p=document.createElement('div');
    p.className='confetti-piece';
    var c=colors[i%colors.length];
    var size=4+Math.random()*6;
    var rot=Math.random()*360;
    var x=W/2+(Math.random()-0.5)*60;
    var dx=(Math.random()-0.5)*W*0.9;
    var dy=window.innerHeight*0.65+Math.random()*window.innerHeight*0.25;
    var dur=1100+Math.random()*900;
    var delay=Math.random()*120;
    var spin=(Math.random()*4-2)*720;
    p.style.cssText='position:fixed;left:'+x+'px;top:-12px;width:'+size+'px;height:'+(size*1.6)+'px;background:'+c+';border-radius:1px;transform:rotate('+rot+'deg);opacity:.95;pointer-events:none;will-change:transform,opacity;z-index:9999';
    host.appendChild(p);
    p.animate([
      {transform:'translate(0,0) rotate('+rot+'deg)',opacity:1},
      {transform:'translate('+dx+'px,'+dy+'px) rotate('+(rot+spin)+'deg)',opacity:0}
    ],{duration:dur,delay:delay,easing:'cubic-bezier(.2,.6,.4,1)',fill:'forwards'}).onfinish=function(el){return function(){el.remove();}}(p);
  }
}

// ── Undo ─────────────────────────────────────────────────────
async function undo(){
  var last=S.matches[0];if(!last){toast('Geen wedstrijd om ongedaan te maken');return}
  if(!confirm('Laatste wedstrijd ongedaan maken?'))return;
  var w=find(last.wid),l=find(last.lid);if(!w||!l)return;
  try{
    await Promise.all([
      db.from('matches').delete().eq('id',last.id),
      db.from('players').update({elo:w.elo-last.d,wins:Math.max(0,w.wins-1)}).eq('id',w.id),
      db.from('players').update({elo:l.elo+last.d,losses:Math.max(0,l.losses-1)}).eq('id',l.id)
    ]);
    await dbLoad();toast('Wedstrijd ongedaan gemaakt');render();
  }catch(e){toast('Fout: '+e.message)}
}

// ── Queue actions ─────────────────────────────────────────────
async function addQueue(pid){
  var ok=await dbAddQueue(pid);
  if(!ok){toast('Staat al in de wachtrij');return}
  await dbLoadQueue();
  var p=find(pid);toast((p?p.name:'Speler')+' staat in de rij! &#129689;');render();
}
async function addQueueAndBack(pid){
  var ok=await dbAddQueue(pid);
  if(!ok){toast('Staat al in de wachtrij');return}
  await dbLoadQueue();
  var p=find(pid);toast((p?p.name:'Speler')+' staat in de rij! &#129689;');render();
}
async function removeQueue(qid){
  await dbRemoveQueue(qid);
  await dbLoadQueue();toast('Uit de wachtrij verwijderd');render();
}
async function clearQueue(){
  if(!confirm('Wachtrij leegmaken?'))return;
  await dbClearQueue();await dbLoadQueue();toast('Wachtrij geleegd');render();
}
function qSearch(val){
  S.qSrchQ=val;
  var el=document.getElementById('qlist');if(!el)return;
  var sp=S.players.slice().sort(function(a,b){return a.name.localeCompare(b.name)});
  var inQ=getActiveQueue().map(function(q){return q.speler_id});
  el.innerHTML=buildQListHtml(sp,inQ);
}

// ── Player management ─────────────────────────────────────────
function goP(id){if(S.view==='k')S.view='p';S.selP=id;render()}
async function addP(){
  var i=document.getElementById('nn'),n=i&&i.value?i.value.trim():'';
  if(!n){toast('Vul een naam in');return}
  if(S.players.filter(function(p){return p.name.toLowerCase()===n.toLowerCase()}).length){toast('Bestaat al');return}
  try{
    var r=await db.from('players').insert({name:n,elo:ELO0,wins:0,losses:0}).select().single();
    S.players=S.players.concat([{id:r.data.id,name:r.data.name,elo:r.data.elo,wins:r.data.wins,losses:r.data.losses}]);
    if(i)i.value='';toast(n+' toegevoegd!');render();
  }catch(e){toast('Fout: '+e.message)}
}
async function delP(id){
  var p=find(id);if(!p)return;
  var msg = p.wins+p.losses > 0
    ? 'Dit verwijdert het profiel van '+p.name+' definitief, inclusief alle '+( p.wins+p.losses)+' gespeelde wedstrijden. Dit kan niet ongedaan worden gemaakt.'
    : 'Weet je zeker dat je '+p.name+' wilt verwijderen? Dit kan niet ongedaan worden gemaakt.';
  showModal('Speler verwijderen', msg, 'Definitief verwijderen', async function(){
    try{
      await removePhoto(id);
      await Promise.all([db.from('matches').delete().or('winner_id.eq.'+id+',loser_id.eq.'+id),db.from('players').delete().eq('id',id)]);
      await dbLoad();S.selP=null;toast(p.name+' verwijderd');render();
    }catch(e){toast('Fout: '+e.message)}
  });
}
function filterP(q){
  var el=document.getElementById('plist');if(!el)return;
  var s=sorted(),a=S.players.slice().sort(function(x,y){return x.name.localeCompare(y.name)});
  var f=q?a.filter(function(p){return p.name.toLowerCase().indexOf(q.toLowerCase())>-1}):a;
  el.innerHTML=f.map(function(p){
    var r=0;for(var i=0;i<s.length;i++){if(s[i].id===p.id){r=i+1;break}}
    var t=p.wins+p.losses;
    var photo=getPhoto(p.id);
    var av=photo?'<img src="'+photo+'" style="width:42px;height:42px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bor);flex-shrink:0" alt="">':'<div class="av" style="width:42px;height:42px;font-size:14px">'+ini(p.name)+'</div>';
    return'<div class="pi pi-lg" onclick="goP(\''+p.id+'\')">'+av+'<div class="rii"><div class="rname">'+p.name+'</div><div class="rsub">#'+r+' &middot; '+p.wins+'W '+p.losses+'V'+(t?'':' &middot; inactief')+'</div></div><div class="elo">'+p.elo+'</div></div>';
  }).join('')||'<div class="empty">Niet gevonden</div>';
}

// Photo functions moved above

// ── ELO chart ────────────────────────────────────────────────
function eloChart(pid){
  var pm=S.matches.filter(function(m){return m.wid===pid||m.lid===pid}).slice(0,20).slice().reverse();
  if(pm.length<2)return'';
  var eloH=[],run=1200;
  pm.forEach(function(m){run=m.wid===pid?run+m.d:run-m.d;eloH.push(run)});
  // pad domain by ~5% so points don't sit on edges
  var rawMin=Math.min.apply(null,eloH),rawMax=Math.max.apply(null,eloH);
  var span=Math.max(20,rawMax-rawMin);
  var minE=Math.floor((rawMin-span*0.1)/5)*5,maxE=Math.ceil((rawMax+span*0.1)/5)*5,range=maxE-minE||1;
  // round nice tick values
  var midE=Math.round((minE+maxE)/2);
  // layout: left axis gutter for labels
  var W=280,H=84,padT=8,padB=18,padL=34,padR=8;
  var plotW=W-padL-padR,plotH=H-padT-padB;
  function xAt(i){return padL+i*plotW/(eloH.length-1)}
  function yAt(e){return padT+plotH-(e-minE)/range*plotH}
  var pts=eloH.map(function(e,i){return xAt(i)+','+yAt(e)}).join(' ');
  var lx=xAt(eloH.length-1),ly=yAt(eloH[eloH.length-1]);
  var col=eloH[eloH.length-1]>=eloH[0]?'var(--pos)':'var(--neg)',diff=eloH[eloH.length-1]-eloH[0];
  // gridlines + axis labels
  var ticks=[maxE,midE,minE];
  var gridY=ticks.map(function(t){return yAt(t)});
  var grid='';
  for(var i=0;i<ticks.length;i++){
    grid+='<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+gridY[i]+'" y2="'+gridY[i]+'" stroke="var(--line)" stroke-width="1" stroke-dasharray="'+(i===1?'2 3':'0')+'"/>';
    grid+='<text x="'+(padL-6)+'" y="'+(gridY[i]+3)+'" text-anchor="end" font-size="9" fill="var(--mute)" font-family="JetBrains Mono, ui-monospace, monospace">'+ticks[i]+'</text>';
  }
  // x-axis baseline + first/last match labels
  var firstD=S.matches[S.matches.length-1]?new Date(S.matches[S.matches.length-1].date):null;

function kiAvatar(pid,size){
  size=size||30;
  var photo=getPhoto(pid);
  if(photo)return'<img src="'+photo+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bor);flex-shrink:0;display:block" alt="">';
  return'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:#eee;border:1.5px solid var(--bor);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">'+
    '<svg viewBox="0 0 24 24" width="'+(size*0.6)+'" height="'+(size*0.6)+'" fill="var(--mid)"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>';
}

function kiCard(p,pos,total){
  var hasTail=total && total>5; // need enough players for a meaningful bottom-3
  var fromEnd=total?total-pos+1:99; // 1=last, 2=2nd-last, 3=3rd-last
  var isLast=hasTail && fromEnd===1;
  var isLast2=hasTail && fromEnd===2;
  var isLast3=hasTail && fromEnd===3;
  var nc=pos===1?'t1':pos===2?'t2':pos===3?'t3':isLast?'tlast':isLast2?'tlast2':isLast3?'tlast3':'';
  var rankDisp=pos<=3
    ?(pos===1?'🏆':pos===2?'🥈':'🥉')
    :isLast?'💩':pos;
  var aq=getActiveQueue();var qpos=-1;
  for(var i=0;i<aq.length;i++){if(aq[i].speler_id===p.id){qpos=i+1;break}}
  var qmark=qpos===1?'<span class="qchip">▶ Eerste munt</span>':qpos>1?'<span class="qchip-2">#'+qpos+' in rij</span>':'';
  var tot=p.wins+p.losses,pct=tot?Math.round(p.wins/tot*100):0;
  var statsLine=tot
    ?'<div class="ki-name-row2"><span style="color:var(--pos);font-weight:600">'+p.wins+'W</span><span class="dot"></span><span style="color:var(--neg);font-weight:600">'+p.losses+'V</span><span class="dot"></span><span style="color:var(--ink);font-weight:600">'+pct+'%</span></div>'
    :'<div class="ki-name-row2" style="color:var(--faint)">geen wedstrijden</div>';
  // Tiered sizing — mirrored: #1==last, #2==2nd-last, #3==3rd-last, rest baseline
  var tier=pos===1||isLast?1:pos===2||isLast2?2:pos===3||isLast3?3:0;
  var avSize=tier===1?72:tier===2?62:tier===3?54:46;
  var sizeCls=tier===1?' r1':tier===2?' r2':tier===3?' r3':'';
  var topCls=pos<=3?' top3':'';
  var botCls=(isLast||isLast2||isLast3)?' bot3':'';
  return'<div class="ki'+topCls+botCls+(isLast?' last':'')+sizeCls+'" onclick="goP(\''+p.id+'\')">'+
    '<div class="ki-num '+nc+'">'+rankDisp+'</div>'+
    '<div class="ki-av-wrap">'+kiAvatar(p.id,avSize)+'</div>'+
    '<div class="ki-info">'+
      '<div class="ki-name">'+p.name+(qmark?' '+qmark:'')+'</div>'+
      statsLine+
    '</div>'+
    '<div class="ki-right">'+
      arrow(p.id)+
      '<div class="ki-elo">'+p.elo+'</div>'+
    '</div>'+
    '</div>';
}

  var mv=act.map(function(p){return{p:p,c:weekDelta(p.id)}}).filter(function(x){return x.c!==0}).sort(function(a,b){return b.c-a.c});
  var topUp=mv[0],topDn=mv[mv.length-1];
  var sp=S.players.slice().sort(function(a,b){return a.name.localeCompare(b.name)});

// ── Modal ─────────────────────────────────────────────────────
var _modalCallback = null;
function showModal(title, msg, confirmLabel, cb){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-confirm-btn').textContent = confirmLabel||'Bevestig';
  _modalCallback = cb;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(){
  document.getElementById('modal-overlay').style.display = 'none';
  _modalCallback = null;
}
function confirmModal(){
  var cb = _modalCallback;
  closeModal();
  if(cb) cb();
}

// ── Photo storage via Supabase ────────────────────────────────
var _photoCache = {};

async function loadPhotoUrls(){
  // Load public URLs for all players - check which files exist
  _photoCache = {};
  try{
    var r = await db.storage.from('player-photos').list('', {limit:500});
    if(r.data){
      r.data.forEach(function(f){
        var pid = f.name.replace(/\.[^.]+$/,'');
        var url = db.storage.from('player-photos').getPublicUrl(f.name).data.publicUrl;
        _photoCache[pid] = url + '?t=' + f.updated_at;
      });
    }
  }catch(e){ /* Storage not set up yet, fall back to localStorage */ }
}

function getPhoto(pid){
  // Try Supabase cache first, then localStorage fallback
  if(_photoCache[pid]) return _photoCache[pid];
  try{return localStorage.getItem('photo_'+pid)}catch(e){return null}
}

function uploadPhoto(pid){
  var inp = document.getElementById('photo-inp-'+pid);
  if(inp) inp.click();
}

async function handlePhotoUpload(input, pid){
  var file = input.files[0]; if(!file) return;
  if(file.size > 3*1024*1024){toast('Foto mag max 3MB zijn'); return}
  toast('Uploaden...');
  try{
    // Determine extension
    var ext = file.type === 'image/png' ? 'png' : file.type === 'image/webp' ? 'webp' : 'jpg';
    var filename = pid + '.' + ext;
    // Remove old files for this player first
    var existing = await db.storage.from('player-photos').list('',{search:pid});
    if(existing.data && existing.data.length){
      await db.storage.from('player-photos').remove(existing.data.map(function(f){return f.name}));
    }
    // Upload new
    var r = await db.storage.from('player-photos').upload(filename, file, {upsert:true, contentType:file.type});
    if(r.error) throw new Error(String(r.error.message||r.error));
    var url = db.storage.from('player-photos').getPublicUrl(filename).data.publicUrl;
    _photoCache[pid] = url + '?t=' + Date.now();
    toast('Foto opgeslagen! &#128247;');
    render();
  }catch(e){
    // Fallback to localStorage if storage not configured
    var reader = new FileReader();
    reader.onload = function(ev){
      try{localStorage.setItem('photo_'+pid, ev.target.result)}catch(ex){}
      _photoCache[pid] = ev.target.result;
      toast('Foto opgeslagen!');
      render();
    };
    reader.readAsDataURL(file);
  }
}

async function removePhoto(pid){
  try{
    var existing = await db.storage.from('player-photos').list('',{search:pid});
    if(existing.data && existing.data.length){
      await db.storage.from('player-photos').remove(existing.data.map(function(f){return f.name}));
    }
  }catch(e){}
  delete _photoCache[pid];
  try{localStorage.removeItem('photo_'+pid)}catch(e){}
  toast('Foto verwijderd');
  render();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  var ct=document.getElementById('ct');if(ct)ct.textContent=S.matches.length?S.matches.length+'x':'';
  var f=document.getElementById('fab');if(f)f.style.background=S.view==='w'?'var(--gd)':'var(--g)';
  ['k','q','s','p'].forEach(function(x){var e=document.getElementById('n'+x);if(e){var c=e.className.replace(/\ba\b/g,'').trim();e.className=c+(S.view===x?' a':'')}});
  var qLen=getActiveQueue().length;
  var badge=document.getElementById('qbadge');
  if(badge){badge.style.display=qLen>0?'block':'none';if(qLen>0)badge.textContent=qLen;}
  if(S.srch){document.getElementById('mc').innerHTML=bSrch();setTimeout(function(){fillList();var i=document.getElementById('si');if(i)i.focus()},50);return}
  var c=document.getElementById('mc');
  if(S.view==='k')c.innerHTML=bK();
  else if(S.view==='q')c.innerHTML=bQ();
  else if(S.view==='w')c.innerHTML=S.step==='confirm'?bConf():bW();
  else if(S.view==='s')c.innerHTML=bS();
  else c.innerHTML=bP();
}

// ── Init ──────────────────────────────────────────────────────
async function init(){
  if(SUPABASE_URL==='JOUW_SUPABASE_URL_HIER'){
    document.getElementById('loading').style.display='none';
    document.getElementById('cfg').style.display='flex';return;
  }
  try{
    db=_sb.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    await dbSeed();
    await dbLoad();
    await Promise.all([dbLoadQueue(), loadPhotoUrls()]);
    setupRealtime();
    hideLoad();
    render();
  }catch(e){
    var msg='Onbekende fout';
    try{msg=e&&e.message?String(e.message):String(e)}catch(_){}
    document.getElementById('loading').querySelector('p').textContent='Fout: '+msg;
    console.error('Init error:',e);
  }
}
init();
